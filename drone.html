<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Flappy Drone 3D</title>
<style>
html, body { margin: 0; padding: 0; overflow: hidden; overscroll-behavior: none; }
body {
  background: #050505;
  font-family: 'Segoe UI', Arial, sans-serif;
  touch-action: none;
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
  height: 100dvh;
  width: 100vw;
  position: fixed;
  top: 0; left: 0;
}
#canvas-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
canvas { display: block; width: 100%; height: 100%; touch-action: none; }

/* UI Overlay */
#ui {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding-top: env(safe-area-inset-top, 10px);
  padding-bottom: env(safe-area-inset-bottom, 10px);
}
#ui > * { pointer-events: auto; }
.screen { display: none; flex-direction: column; align-items: center; text-align: center; color: #fff; width: 90%; max-width: 360px; }
.screen.active { display: flex; }
h1 { font-size: 2.2rem; text-shadow: 0 0 15px rgba(0,200,255,0.5); margin-bottom: 8px; }
h2 { font-size: 1.4rem; margin: 8px 0; }
.btn {
  background: rgba(255,107,53,0.2); border: 2px solid #ff6b35; color: #fff;
  padding: 12px 24px; margin: 6px; font-size: 1.1rem; cursor: pointer;
  border-radius: 8px; transition: 0.15s; width: 80%;
  -webkit-tap-highlight-color: transparent;
}
.btn:active { transform: scale(0.96); background: rgba(255,107,53,0.4); }
.drone-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; width: 100%; }
.drone-card {
  background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.2);
  border-radius: 10px; padding: 12px; cursor: pointer; transition: 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.drone-card.selected { border-color: #48bb78; background: rgba(72,187,120,0.15); }
.drone-card:active { transform: scale(0.97); }

#hud {
  position: absolute; top: env(safe-area-inset-top, 10px); left: 10px; right: 10px;
  display: none; justify-content: space-between; align-items: center;
  font-size: 1rem; color: #fff; pointer-events: none; padding: 5px;
}
.hp-bar { width: 50px; height: 8px; background: rgba(0,0,0,0.5); border-radius: 4px; overflow: hidden; border: 1px solid rgba(255,255,255,0.3); }
.hp-fill { height: 100%; background: #48bb78; transition: width 0.2s; }
#sound-toggle {
  position: absolute; top: env(safe-area-inset-top, 10px); right: 10px;
  background: rgba(0,0,0,0.4); color: #fff; border: 1px solid rgba(255,255,255,0.2);
  padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 1.2rem;
  -webkit-tap-highlight-color: transparent;
}
#webgl-fallback { display: none; color: #ff4444; padding: 20px; text-align: center; background: #111; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
</style>
</head>
<body>

<div id="canvas-container"></div>

<div id="ui">
  <div id="hud">
    <div style="display:flex;align-items:center;gap:6px;">
      <span>❤️</span><div class="hp-bar"><div class="hp-fill" id="hp-fill"></div></div>
    </div>
    <span id="score-display" style="font-weight:bold; text-shadow:0 0 5px #000;">0</span>
  </div>

  <button id="sound-toggle">🔊</button>

  <div id="menu-screen" class="screen active">
    <h1>FLAPPY DRONE</h1>
    <h2 style="color:#ff6b35;">3D EDITION</h2>
    <button class="btn" onclick="ui.show('select')">▶ ИГРАТЬ</button>
    <div style="margin-top:8px; opacity:0.7; font-size:0.85rem;">Тапай / Клик / Пробел</div>
  </div>

  <div id="select-screen" class="screen">
    <h2>ВЫБЕРИ ДРОНА</h2>
    <div class="drone-grid" id="drone-grid"></div>
    <button class="btn" onclick="ui.show('menu')" style="border-color:#888;">← НАЗАД</button>
  </div>

  <div id="gameover-screen" class="screen">
    <h2 style="color:#ff4444;">GAME OVER</h2>
    <div style="font-size:1.1rem; margin:8px 0;">Счёт: <span id="go-score">0</span> | Ур: <span id="go-level">1</span></div>
    <button class="btn" onclick="ui.show('select')">🔄 В МЕНЮ ДРОНОВ</button>
  </div>
</div>

<div id="webgl-fallback">
  ⚠️ Устройство не поддерживает WebGL.<br>Попробуйте другой браузер.
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ================= 🍎 iOS DETECTION & OPTIMIZATION =================
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || 
              (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
const isWebview = /(iPhone|iPad|iPod).*AppleWebKit/i.test(navigator.userAgent) || /FBAN|FBAV|Telegram|VK|Max/.test(navigator.userAgent);

function vibrate(pattern) {
  // 🚫 iOS не поддерживает вибрацию в браузере/Webview
  if (!isIOS() && navigator.vibrate) navigator.vibrate(pattern);
}

// ================= 🔊 AUDIO SYSTEM =================
let audioCtx, soundEnabled = true, audioUnlocked = false;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  // 🔓 iOS требует явного "пробуждения" аудио через пользовательский жест
  if (!audioUnlocked && isIOS()) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    gain.gain.value = 0.0001;
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.05);
    audioUnlocked = true;
  }
}
function playTone(freq, type, dur, vol=0.1) { if(!soundEnabled||!audioCtx) return; const o=audioCtx.createOscillator(), g=audioCtx.createGain(); o.type=type; o.frequency.setValueAtTime(freq, audioCtx.currentTime); g.gain.setValueAtTime(vol, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime+dur); o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+dur); }
function playNoise(dur, vol=0.2) { if(!soundEnabled||!audioCtx) return; const buf=audioCtx.createBuffer(1, audioCtx.sampleRate*dur, audioCtx.sampleRate), d=buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1; const s=audioCtx.createBufferSource(), g=audioCtx.createGain(); s.buffer=buf; g.gain.setValueAtTime(vol, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime+dur); s.connect(g); g.connect(audioCtx.destination); s.start(); }
const sfx = { flap:()=>{playNoise(0.05,0.1);playTone(300,'sine',0.05,0.05)}, hit:()=>{playNoise(0.4,0.4);playTone(80,'sawtooth',0.3,0.2)}, target:()=>{playTone(600,'sine',0.1,0.15);setTimeout(()=>playTone(900,'sine',0.2,0.15),100)}, over:()=>{playTone(200,'square',0.3,0.2);setTimeout(()=>playTone(100,'sawtooth',0.5,0.3),200)}, click:()=>{playTone(800,'sine',0.05,0.1)} };

// ================= 🎮 3D SCENE SETUP =================
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0f172a);
scene.fog = new THREE.FogExp2(0x0f172a, 0.015);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 200);
camera.position.set(0, 15, 65);
camera.lookAt(0, 5, 0);

const renderer = new THREE.WebGLRenderer({ antialias: !isWebview, alpha: false, powerPreference: "high-performance" });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // 📱 Оптимизация для Retina
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
container.appendChild(renderer.domElement);

if (!renderer.capabilities.isWebGL) { document.getElementById('webgl-fallback').style.display='block'; renderer.domElement.style.display='none'; }

// Lights
const ambient = new THREE.AmbientLight(0x404060, 0.7);
scene.add(ambient);
const dirLight = new THREE.DirectionalLight(0xffffff, 0.9);
dirLight.position.set(20, 50, 40);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(1024, 1024);
dirLight.shadow.camera.near = 0.5; dirLight.shadow.camera.far = 100;
scene.add(dirLight);

// Ground
const groundGeo = new THREE.PlaneGeometry(300, 150, 32, 32);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x1a3a1a, roughness: 0.85 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI/2; ground.position.y = -25;
ground.receiveShadow = true; scene.add(ground);

// Stars
const starGeo = new THREE.BufferGeometry();
const starCount = 400;
const starPos = new Float32Array(starCount*3);
for(let i=0;i<starCount*3;i++) starPos[i] = (Math.random()-0.5)*250;
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.6, sizeAttenuation: true });
scene.add(new THREE.Points(starGeo, starMat));

// ================= 🚁 DRONE MODELS =================
const droneMesh = new THREE.Group();
const droneTypes = [
  { id:1, name:'ТАКТИЧЕСКИЙ', color: 0x3a3a3a, accent: 0x4a4a3a },
  { id:2, name:'СТЕЛС',       color: 0x1e293b, accent: 0x00d4ff },
  { id:3, name:'FPV',         color: 0x2a2a2a, accent: 0xff3333 },
  { id:4, name:'ТЯЖЁЛЫЙ',     color: 0x4b5320, accent: 0x5a632a }
];
let selectedStyle = 1;

function buildDrone(styleId) {
  while(droneMesh.children.length) droneMesh.remove(droneMesh.children[0]);
  const t = droneTypes.find(d=>d.id===styleId) || droneTypes[0];
  const bodyMat = new THREE.MeshStandardMaterial({ color: t.color, roughness: 0.6, metalness: 0.2 });
  const body = new THREE.Mesh(new THREE.BoxGeometry(5, 2, 3.5), bodyMat);
  body.castShadow = true; droneMesh.add(body);

  // Rotors
  const rotors = [];
  [[-3.5, 2.5, -2.5], [3.5, 2.5, -2.5], [-3.5, 2.5, 2.5], [3.5, 2.5, 2.5]].forEach(p => {
    const arm = new THREE.Mesh(new THREE.BoxGeometry(2.5, 0.3, 0.3), bodyMat);
    arm.position.set(Math.sign(p[0])*1.8, 0, Math.sign(p[2])*1.5);
    droneMesh.add(arm);
    const disc = new THREE.Mesh(new THREE.CylinderGeometry(1.6, 1.6, 0.15, 12), new THREE.MeshStandardMaterial({ color: 0x555, emissive: t.accent, emissiveIntensity: 0.2 }));
    disc.position.set(p[0], p[1], p[2]); disc.rotation.x = Math.PI/2;
    droneMesh.add(disc); rotors.push(disc);
  });

  // Flag
  const flagGeo = new THREE.PlaneGeometry(1.8, 1.1, 3, 2);
  const flagMat = new THREE.MeshStandardMaterial({ side: THREE.DoubleSide, color: 0xffffff, emissive: t.accent, emissiveIntensity: 0.1 });
  const flag = new THREE.Mesh(flagGeo, flagMat);
  flag.position.set(-2, 3.5, 0); droneMesh.add(flag);

  droneMesh.userData = { rotors, flag };
  droneMesh.position.set(-12, 8, 0);
  scene.add(droneMesh);
}
buildDrone(1);

// ================= 🏗️ GAME OBJECTS =================
const towers = [];
const towerGeo = new THREE.BoxGeometry(6, 60, 6);
const towerMat = new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.7 });
let towerTimer = 0;
const TOWER_GAP = 20;
let towerSpeed = 0.18, baseTowerSpeed = 0.18;

function spawnTower() {
  const topH = 8 + Math.random() * 28;
  const top = new THREE.Mesh(towerGeo, towerMat); top.scale.y = topH/30; top.position.set(45, topH/2 + TOWER_GAP/2 - 5, 0); top.castShadow = true; top.receiveShadow = true;
  const botH = 45 - topH;
  const bot = new THREE.Mesh(towerGeo, towerMat); bot.scale.y = botH/30; bot.position.set(45, -botH/2 - TOWER_GAP/2 - 5, 0); bot.castShadow = true; bot.receiveShadow = true;
  const group = new THREE.Group(); group.add(top, bot);
  group.userData = { passed: false, shootTimer: 0 };
  scene.add(group); towers.push(group);
}

const bullets = [];
const bulletGeo = new THREE.SphereGeometry(0.4, 8, 8);
const bulletMat = new THREE.MeshStandardMaterial({ color: 0xff3333, emissive: 0xff6600, emissiveIntensity: 0.8 });
let bulletSpeed = 0.28, baseBulletSpeed = 0.28;

function spawnBullet(tower) {
  const b = new THREE.Mesh(bulletGeo, bulletMat);
  b.position.set(tower.position.x, tower.position.y + (Math.random()>0.5 ? 12 : -12), 0);
  b.lookAt(droneMesh.position);
  b.userData = { vel: new THREE.Vector3().subVectors(droneMesh.position, b.position).normalize().multiplyScalar(bulletSpeed) };
  scene.add(b); bullets.push(b);
}

let target = null; let targetActive = false;
const targetMat = new THREE.MeshStandardMaterial({ color: 0x4a5a2a, emissive: 0x222222 });
function spawnTarget() {
  if(target) { scene.remove(target); target=null; }
  target = new THREE.Group();
  target.add(new THREE.Mesh(new THREE.BoxGeometry(5, 2, 3), targetMat));
  target.position.set(45, (Math.random()-0.5)*8, 0); target.rotation.y = Math.random()*0.5;
  scene.add(target); targetActive = true;
}

// ================= 🎛️ GAME STATE & UI =================
let state = 'menu';
let score = 0, frames = 0, difficulty = 0;
let droneHP = 5, maxHP = 5;
let vy = 0, gravity = 0.018, flapPower = 0.28;
let invincible = 0, hitFlash = 0, slowMo = 0, speedMult = 1;
let winMsgTimer = 0;

const ui = {
  show: (screen) => {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(`${screen}-screen`).classList.add('active');
    document.getElementById('hud').style.display = screen==='playing'?'flex':'none';
    state = screen;
    if(screen==='select') buildDroneGrid();
    if(screen==='playing') { sfx.click(); resetGame(); }
  },
  updateHP: () => {
    const fill = document.getElementById('hp-fill');
    fill.style.width = `${(droneHP/maxHP)*100}%`;
    fill.style.background = droneHP>2?'#48bb78':droneHP>1?'#ffaa00':'#ff4444';
  },
  updateScore: () => document.getElementById('score-display').textContent = score
};

function buildDroneGrid() {
  const grid = document.getElementById('drone-grid'); grid.innerHTML = '';
  droneTypes.forEach(dt => {
    const card = document.createElement('div');
    card.className = `drone-card ${selectedStyle===dt.id?'selected':''}`;
    card.innerHTML = `<div style="font-weight:bold;margin-bottom:4px;">${dt.name}</div><div style="font-size:0.75rem;opacity:0.7;">Стиль: ${dt.color===0x1e293b?'Stealth':dt.color===0xff3333?'Racing':'Military'}</div>`;
    card.onclick = (e) => { e.stopPropagation(); selectedStyle=dt.id; sfx.click(); buildDroneDrone(); ui.show('playing'); };
    grid.appendChild(card);
  });
}
function buildDroneDrone() { buildDrone(selectedStyle); } // Обновляем 3D модель

function resetGame() {
  droneMesh.position.set(-12, 8, 0); vy = 0;
  towers.forEach(t => scene.remove(t)); towers.length = 0;
  bullets.forEach(b => scene.remove(b)); bullets.length = 0;
  if(target) { scene.remove(target); target=null; targetActive=false; }
  score = 0; frames = 0; difficulty = 0; 
  towerSpeed = baseTowerSpeed; bulletSpeed = baseBulletSpeed;
  droneHP = maxHP; invincible = 0; hitFlash = 0; slowMo = 0; speedMult = 1;
  ui.updateHP(); ui.updateScore(); state = 'playing';
}

// ================= 🎮 INPUT HANDLING =================
function handleInput(e) {
  if (e.target.closest('.btn') || e.target.closest('.drone-card') || e.target.id === 'sound-toggle') return;
  e.preventDefault(); initAudio();
  if (state === 'menu') { ui.show('select'); return; }
  if (state === 'gameover') { ui.show('select'); return; }
  if (state === 'playing') { vy = flapPower; sfx.flap(); }
}
renderer.domElement.addEventListener('touchstart', handleInput, { passive: false });
renderer.domElement.addEventListener('pointerdown', handleInput, { passive: false });
document.addEventListener('keydown', e => { if(e.code==='Space') handleInput(e); });

document.getElementById('sound-toggle').onclick = (e) => {
  e.stopPropagation(); soundEnabled = !soundEnabled;
  e.target.textContent = soundEnabled?'🔊':'🔇'; if(soundEnabled) sfx.click();
};

// ================= 💥 COLLISION & LOGIC =================
function checkCollisions() {
  const dx = droneMesh.position.x, dy = droneMesh.position.y;
  const r = 2.8;

  for(let t of towers) {
    if (Math.abs(dx - t.position.x) < 6 && (dy > t.position.y + 10 || dy < t.position.y - 10 - TOWER_GAP)) return 'tower';
  }
  for(let b of bullets) if (droneMesh.position.distanceTo(b.position) < r + 0.5) return 'bullet';
  if(target && targetActive && droneMesh.position.distanceTo(target.position) < r + 3) return 'target';
  return null;
}

// ================= 🎬 MAIN LOOP =================
function animate() {
  requestAnimationFrame(animate); frames++;

  // Drone anim
  droneMesh.rotation.z = Math.max(-0.4, Math.min(vy * 1.2, 0.5));
  droneMesh.userData.rotors.forEach(r => r.rotation.y += 0.9 * speedMult);
  if(droneMesh.userData.flag) droneMesh.userData.flag.rotation.y = Math.sin(frames*0.1)*0.3;

  // Time scale
  if(slowMo>0) { slowMo--; speedMult=0.25; } else { speedMult = Math.min(1, speedMult+0.015); }
  if(invincible>0) invincible--;
  droneMesh.visible = !(invincible>0 && frames%4<2);

  if(state === 'playing') {
    vy -= gravity * speedMult;
    droneMesh.position.y += vy * speedMult;
    droneMesh.position.y = Math.max(-22, Math.min(22, droneMesh.position.y));

    // Towers
    towerTimer++;
    const interval = 100 - difficulty * 3;
    if(towerTimer > Math.max(60, interval)) { towerTimer=0; spawnTower(); }
    towers.forEach(t => {
      t.position.x -= towerSpeed * speedMult;
      t.userData.shootTimer++;
      if(t.userData.shootTimer > 75 && t.position.x < 30 && t.position.x > -15) { t.userData.shootTimer = 0; spawnBullet(t); }
      if(!t.userData.passed && t.position.x < droneMesh.position.x - 4) {
        t.userData.passed = true; score++; ui.updateScore();
        if(score%10===0) spawnTarget();
      }
    });
    for(let i=towers.length-1; i>=0; i--) if(towers[i].position.x < -35) { scene.remove(towers[i]); towers.splice(i,1); }

    // Bullets
    bullets.forEach(b => b.position.add(b.userData.vel.clone().multiplyScalar(speedMult)));
    for(let i=bullets.length-1; i>=0; i--) if(Math.abs(bullets[i].position.x)>40 || Math.abs(bullets[i].position.y)>25) { scene.remove(bullets[i]); bullets.splice(i,1); }

    // Target
    if(target && targetActive) {
      target.position.x -= 0.12 * speedMult; target.rotation.y += 0.03;
      if(target.position.x < -35) { scene.remove(target); target=null; targetActive=false; }
    }

    // Collisions
    const hit = checkCollisions();
    if(hit && invincible<=0) {
      if(hit==='target') {
        sfx.target(); vibrate([20]); score+=5; difficulty++; ui.updateScore();
        droneHP = Math.min(maxHP, droneHP+1); ui.updateHP();
        slowMo=40; speedMult=0.25;
        towerSpeed = Math.min(0.32, baseTowerSpeed + difficulty*0.025);
        bulletSpeed = Math.min(0.42, baseBulletSpeed + difficulty*0.03);
        winMsgTimer = 80; scene.remove(target); target=null; targetActive=false;
      } else {
        droneHP--; ui.updateHP(); invincible = 55; hitFlash = 12; vy = -0.12;
        sfx.hit(); vibrate([40]);
        if(hit==='bullet') { const idx=bullets.findIndex(b=>b.position.distanceTo(droneMesh.position)<4); if(idx>-1){scene.remove(bullets[idx]); bullets.splice(idx,1);} }
        if(droneHP<=0) { sfx.over(); vibrate([50,100,50]); gameOver(); }
      }
    }
    if(droneMesh.position.y <= -20) { sfx.over(); vibrate([50,100,50]); gameOver(); }
  }
  renderer.render(scene, camera);
}

function gameOver() {
  state='gameover';
  document.getElementById('go-score').textContent=score;
  document.getElementById('go-level').textContent=difficulty+1;
  ui.show('gameover');
}

// ================= 📱 RESIZE =================
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
</html>
