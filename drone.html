<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Flappy Drone 3D</title>
<style>
html, body { margin: 0; padding: 0; overflow: hidden; overscroll-behavior: none; background: #050505; touch-action: none; }
body { font-family: 'Segoe UI', Arial, sans-serif; -webkit-user-select: none; user-select: none; height: 100dvh; width: 100vw; position: fixed; top: 0; left: 0; }
#gameCanvas { display: block; width: 100%; height: 100%; touch-action: none; background: #0b1120; }
#ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; align-items: center; justify-content: center; padding-top: env(safe-area-inset-top, 10px); }
#ui > * { pointer-events: auto; }
.screen { display: none; flex-direction: column; align-items: center; text-align: center; color: #fff; width: 90%; max-width: 380px; background: rgba(10,15,25,0.85); padding: 20px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.15); backdrop-filter: blur(12px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
.screen.active { display: flex; }
h1 { font-size: 2.2rem; text-shadow: 0 0 15px rgba(0,180,255,0.6); margin-bottom: 6px; }
h2 { font-size: 1.3rem; margin: 6px 0; color: #ff6b35; }
.btn { background: rgba(255,107,53,0.15); border: 2px solid #ff6b35; color: #fff; padding: 14px 20px; margin: 8px; font-size: 1.1rem; cursor: pointer; border-radius: 8px; transition: 0.15s; width: 85%; -webkit-tap-highlight-color: transparent; }
.btn:active { transform: scale(0.96); background: rgba(255,107,53,0.35); }
.drone-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 12px 0; width: 100%; }
.drone-card { background: rgba(255,255,255,0.06); border: 2px solid rgba(255,255,255,0.2); border-radius: 10px; padding: 12px; cursor: pointer; transition: 0.15s; text-align: left; }
.drone-card.selected { border-color: #48bb78; background: rgba(72,187,120,0.15); }
.drone-card:active { transform: scale(0.97); }
.stat-row { display: flex; align-items: center; margin: 3px 0; font-size: 0.75rem; opacity: 0.8; }
.stat-bar { flex: 1; height: 6px; background: rgba(0,0,0,0.4); border-radius: 3px; margin-left: 6px; overflow: hidden; }
.stat-fill { height: 100%; border-radius: 3px; }
#hud { position: absolute; top: env(safe-area-inset-top, 10px); left: 10px; right: 10px; display: none; justify-content: space-between; align-items: center; font-size: 0.95rem; color: #fff; pointer-events: none; padding: 6px 10px; background: rgba(0,0,0,0.4); border-radius: 8px; backdrop-filter: blur(5px); }
.hp-bar { width: 50px; height: 8px; background: rgba(0,0,0,0.6); border-radius: 4px; overflow: hidden; border: 1px solid rgba(255,255,255,0.3); }
.hp-fill { height: 100%; background: #48bb78; transition: width 0.2s; }
#shield-hud { display: none; color: #a855f7; font-weight: bold; text-shadow: 0 0 8px #a855f7; }
#sound-toggle { position: absolute; top: env(safe-area-inset-top, 10px); right: 10px; background: rgba(0,0,0,0.4); color: #fff; border: 1px solid rgba(255,255,255,0.2); padding: 8px 10px; border-radius: 6px; cursor: pointer; font-size: 1.1rem; z-index: 10; }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="ui">
  <div id="hud">
    <div style="display:flex;align-items:center;gap:6px;"><span>❤️</span><div class="hp-bar"><div class="hp-fill" id="hp-fill"></div></div></div>
    <span id="shield-hud">🛡️ 5s</span>
    <span id="score-display" style="font-weight:bold; text-shadow:0 0 4px #000;">0</span>
  </div>
  <button id="sound-toggle">🔊</button>
  <div id="menu-screen" class="screen active">
    <h1>FLAPPY DRONE</h1>
    <h2>3D EDITION</h2>
    <div style="opacity:0.8; margin:4px 0; font-size:0.9rem;">🏆 Рекорд: <span id="hs-display">0</span></div>
    <button class="btn" id="btn-start">▶ ИГРАТЬ</button>
    <div style="margin-top:8px; opacity:0.7; font-size:0.85rem;">Тапай по экрану / Пробел</div>
  </div>
  <div id="select-screen" class="screen">
    <h2>ВЫБЕРИ ДРОНА</h2>
    <div class="drone-grid" id="drone-grid"></div>
    <button class="btn" id="btn-back-menu" style="border-color:#888; margin-top:10px;">← НАЗАД</button>
  </div>
  <div id="gameover-screen" class="screen">
    <h2 style="color:#ff4444;">GAME OVER</h2>
    <div style="font-size:1.1rem; margin:10px 0;">Счёт: <span id="go-score">0</span> | Ур: <span id="go-level">1</span></div>
    <div style="opacity:0.8; margin:4px 0; font-size:0.9rem;">🏆 Рекорд: <span id="go-hs">0</span></div>
    <button class="btn" id="btn-reselect">🔄 В МЕНЮ ДРОНОВ</button>
  </div>
</div>

<script>
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
function vibrate(p) { if (!isIOS && navigator.vibrate) navigator.vibrate(p); }

let audioCtx, soundEnabled = true, audioUnlocked = false;
function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); if (audioCtx.state === 'suspended') audioCtx.resume(); if (!audioUnlocked && isIOS) { const o=audioCtx.createOscillator(), g=audioCtx.createGain(); g.gain.value=0.0001; o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+0.05); audioUnlocked=true; } }
function playTone(f, t, d, v=0.1) { if(!soundEnabled||!audioCtx) return; const o=audioCtx.createOscillator(), g=audioCtx.createGain(); o.type=t; o.frequency.setValueAtTime(f, audioCtx.currentTime); g.gain.setValueAtTime(v, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime+d); o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+d); }
function playNoise(d, v=0.2) { if(!soundEnabled||!audioCtx) return; const b=audioCtx.createBuffer(1, audioCtx.sampleRate*d, audioCtx.sampleRate), d1=b.getChannelData(0); for(let i=0;i<d1.length;i++) d1[i]=Math.random()*2-1; const s=audioCtx.createBufferSource(), g=audioCtx.createGain(); s.buffer=b; g.gain.setValueAtTime(v, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime+d); s.connect(g); g.connect(audioCtx.destination); s.start(); }
const sfx = { flap:()=>{playNoise(0.05,0.1);playTone(300,'sine',0.05,0.05)}, hit:()=>{playNoise(0.4,0.4);playTone(80,'sawtooth',0.3,0.2)}, target:()=>{playTone(600,'sine',0.1,0.15);setTimeout(()=>playTone(900,'sine',0.2,0.15),100)}, over:()=>{playTone(200,'square',0.3,0.2);setTimeout(()=>playTone(100,'sawtooth',0.5,0.3),200)}, click:()=>{playTone(800,'sine',0.05,0.1)}, medkit:()=>{playTone(800,'sine',0.1,0.15);setTimeout(()=>playTone(1000,'sine',0.15,0.15),100)}, shield:()=>{playTone(400,'sine',0.2,0.15);setTimeout(()=>playTone(600,'sine',0.2,0.15),100);setTimeout(()=>playTone(800,'sine',0.3,0.15),200)} };

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
window.addEventListener('resize', resize); resize();

let highScore = parseInt(localStorage.getItem('drone_hs') || '0');
function updateHS() { document.getElementById('hs-display').textContent = highScore; const g=document.getElementById('go-hs'); if(g) g.textContent = highScore; }
updateHS();

const droneConfigs = [
  { id:1, name:'ТАКТИЧЕСКИЙ', c1:'#4a4a5a', c2:'#2d2d3a', grav:0.40, flap:-7.5, hp:5, hitbox:16, rotSpd:1.0, desc:'Сбалансированный' },
  { id:2, name:'СТЕЛС',       c1:'#1e293b', c2:'#0f172a', grav:0.35, flap:-8.0, hp:3, hitbox:14, rotSpd:1.1, desc:'Лёгкий, манёвренный' },
  { id:3, name:'FPV',         c1:'#2a2a3a', c2:'#1a1a25', grav:0.45, flap:-8.5, hp:4, hitbox:15, rotSpd:1.3, desc:'Резкий, для опытных' },
  { id:4, name:'ТЯЖЁЛЫЙ',     c1:'#4b5320', c2:'#3a401a', grav:0.30, flap:-6.5, hp:8, hitbox:18, rotSpd:0.8, desc:'Танк, стабильный' }
];

let selectedDrone = 2, state = 'menu';
let currentDrone = droneConfigs.find(d=>d.id===selectedDrone);
let score = 0, frames = 0, difficulty = 0;
let drone = { x: 80, y: H/2, w: 40, h: 24, vy: 0, rot: 0, prop: 0 };
let droneHP = 5, maxHP = 5, invincible = 0, hitboxRadius = 16;
let isInvincible = false, invincibleShieldTimer = 0;
let towers = [], bullets = [], particles = [], bgBuildings = [], medkit = null, shieldMedkit = null, target = null, targetActive = false;
let towerTimer = 0, towerSpeed = 2.0, towerGap = 220, groundH = 80;
let bulletSpeed = 3.0, slowMo = 0, speedMult = 1, winMsgTimer = 0, screenFlash = 0;
let gravity = 0.4, flapPower = -7.5;

const ui = {
  show: (screen) => {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    const el = document.getElementById(`${screen}-screen`); if(el) el.classList.add('active');
    document.getElementById('hud').style.display = screen==='playing'?'flex':'none';
    document.getElementById('shield-hud').style.display = isInvincible ? 'block' : 'none';
    state = screen;
    if(screen==='select') buildDroneGrid();
    if(screen==='playing') { sfx.click(); resetGame(); }
    updateHS();
  },
  updateHP: () => { const f=document.getElementById('hp-fill'); if(!f)return; f.style.width=`${(droneHP/maxHP)*100}%`; f.style.background=droneHP>2?'#48bb78':droneHP>1?'#ffaa00':'#ff4444'; },
  updateScore: () => { const el=document.getElementById('score-display'); if(el) el.textContent = score; },
  updateShieldHUD: () => {
    const el = document.getElementById('shield-hud');
    if(isInvincible) { el.style.display='block'; el.textContent = `🛡️ ${Math.ceil(invincibleShieldTimer/60)}s`; }
    else { el.style.display='none'; }
  }
};

function buildDroneGrid() {
  const g = document.getElementById('drone-grid'); if(!g) return; g.innerHTML = '';
  droneConfigs.forEach(cfg => {
    const isSel = selectedDrone===cfg.id;
    const card = document.createElement('div');
    card.className = `drone-card ${isSel?'selected':''}`;
    card.innerHTML = `
      <div style="font-weight:bold;margin-bottom:6px;">${cfg.name}</div>
      <div style="font-size:0.7rem;opacity:0.6;margin-bottom:6px;">${cfg.desc}</div>
      <div class="stat-row"><span>❤️</span><div class="stat-bar"><div class="stat-fill" style="width:${cfg.hp*12.5}%;background:#ff4444"></div></div></div>
      <div class="stat-row"><span>⚡</span><div class="stat-bar"><div class="stat-fill" style="width:${(1-cfg.grav/0.5)*100}%;background:#ffaa00"></div></div></div>
      <div class="stat-row"><span>🛡️</span><div class="stat-bar"><div class="stat-fill" style="width:${(1-cfg.hitbox/20)*100}%;background:#48bb78"></div></div></div>
    `;
    card.onclick = (e) => { e.stopPropagation(); selectedDrone=cfg.id; sfx.click(); buildDroneGrid(); ui.show('playing'); };
    g.appendChild(card);
  });
}

function generateWindows(topH, botY, w) {
  const wins = [];
  const rowsTop = Math.floor(topH/28), rowsBot = Math.floor((H-groundH-botY)/28);
  for(let r=0; r<rowsTop; r++) for(let c=0; c<4; c++) wins.push({ x: 8+c*12, y: topH - 30 - r*28, lit: Math.random() > 0.35, warm: Math.random() > 0.5 });
  for(let r=0; r<rowsBot; r++) for(let c=0; c<4; c++) wins.push({ x: 8+c*12, y: botY + 25 + r*28, lit: Math.random() > 0.35, warm: Math.random() > 0.5 });
  return wins;
}

function resetGame() {
  currentDrone = droneConfigs.find(d=>d.id===selectedDrone);
  gravity = currentDrone.grav; flapPower = currentDrone.flap; maxHP = currentDrone.hp; hitboxRadius = currentDrone.hitbox;
  drone.x = W*0.25; drone.y = H/2; drone.vy = 0; drone.rot = 0;
  towers = []; bullets = []; particles = []; medkit = null; shieldMedkit = null; target = null; targetActive = false;
  bgBuildings = [];
  for(let i=0; i<8; i++) bgBuildings.push({ x: W + i*120, h: 60 + Math.random()*100, w: 40 + Math.random()*30, color: `hsl(220, 20%, ${8+Math.random()*8}%)` });
  score = 0; frames = 0; difficulty = 0; towerSpeed = 2.0; bulletSpeed = 3.0; towerTimer = 40;
  droneHP = maxHP; invincible = 0; isInvincible = false; invincibleShieldTimer = 0;
  slowMo = 0; speedMult = 1; winMsgTimer = 0; screenFlash = 0;
  ui.updateHP(); ui.updateScore(); ui.updateShieldHUD(); updateHS();
}

canvas.addEventListener('pointerdown', (e) => { e.preventDefault(); initAudio(); if(state==='playing'){drone.vy=flapPower;sfx.flap();} else if(state==='menu'||state==='gameover'){ui.show('select');} });
document.addEventListener('keydown', (e) => { if(e.code==='Space'&&state==='playing'){e.preventDefault();drone.vy=flapPower;sfx.flap();} });
document.getElementById('sound-toggle').onclick = (e) => { e.stopPropagation(); soundEnabled=!soundEnabled; e.target.textContent=soundEnabled?'🔊':'🔇'; if(soundEnabled)sfx.click(); };
document.getElementById('btn-start').onclick = (e) => { e.stopPropagation(); ui.show('select'); };
document.getElementById('btn-back-menu').onclick = (e) => { e.stopPropagation(); ui.show('menu'); };
document.getElementById('btn-reselect').onclick = (e) => { e.stopPropagation(); ui.show('select'); };

function addExplosion(x, y, count, type='hit') {
  for(let i=0; i<count; i++) {
    const angle = Math.random()*Math.PI*2, speed = Math.random()*6+2;
    particles.push({ x, y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed - Math.random()*3, life: 1, decay: Math.random()*0.025+0.01, size: Math.random()*8+3, type });
  }
}

function checkCollisions() {
  const r = hitboxRadius;
  for(let t of towers) if (drone.x+r>t.x && drone.x-r<t.x+t.w && (drone.y-r<t.topH || drone.y+r>t.botY)) return 'tower';
  for(let b of bullets) if (Math.hypot(drone.x-b.x, drone.y-b.y) < r+b.r) return 'bullet';
  if(target && targetActive && Math.hypot(drone.x-target.x, drone.y-target.y) < r+22) return 'target';
  if(medkit && !medkit.collected && Math.hypot(drone.x-medkit.x, drone.y-medkit.y) < r+12) return 'medkit';
  if(shieldMedkit && !shieldMedkit.collected && Math.hypot(drone.x-shieldMedkit.x, drone.y-shieldMedkit.y) < r+14) return 'shield';
  return null;
}

function spawnTower() {
  const minH=80, maxH=Math.max(minH+30, H-groundH-towerGap-80);
  const topH = Math.random()*(maxH-minH)+minH;
  const wins = generateWindows(topH, topH+towerGap, 55);
  towers.push({ x:W+60, w:55, topH, botY:topH+towerGap, passed:false, shootTimer:0, windows:wins });
}
function spawnBullet(t) {
  const sx = t.x + t.w/2, sy = (Math.random()>0.5 ? t.topH-15 : t.botY+15);
  const dx=drone.x-sx, dy=drone.y-sy, dist=Math.hypot(dx,dy)||1;
  bullets.push({ x:sx, y:sy, vx:(dx/dist)*bulletSpeed, vy:(dy/dist)*bulletSpeed, r:5, life: 140 });
}
function spawnTarget() { if(!targetActive && !medkit && !shieldMedkit) { target = { x:W+60, y:Math.random()*(H-groundH-120)+60, w:50, h:30 }; targetActive = true; } }
function spawnMedkit() { if(!targetActive && !medkit && !shieldMedkit) { medkit = { x: W+60, y: Math.random()*(H-groundH-100)+50, collected: false, pulse: 0 }; } }
function spawnShield() { if(!targetActive && !medkit && !shieldMedkit) { shieldMedkit = { x: W+60, y: Math.random()*(H-groundH-100)+50, collected: false, pulse: 0 }; } }

function update() {
  frames++;
  if(state !== 'playing') return;
  if(slowMo>0) { slowMo--; speedMult=0.2; } else { speedMult = Math.min(1, speedMult+0.02); }
  if(invincible>0) invincible--;
  if(screenFlash>0) screenFlash -= 0.04;

  // Shield timer
  if(isInvincible) { invincibleShieldTimer--; ui.updateShieldHUD(); if(invincibleShieldTimer<=0) isInvincible=false; }

  drone.vy += gravity*speedMult;
  drone.y += drone.vy*speedMult;
  drone.rot = Math.max(-0.5, Math.min(drone.vy*0.06*currentDrone.rotSpd, 0.7));
  drone.prop += 0.6*speedMult;
  if(drone.y < 0) { drone.y=0; drone.vy=0; }
  if(drone.y + drone.h > H - groundH) { addExplosion(drone.x, drone.y, 40, 'drone'); sfx.over(); vibrate([50,100,50]); state='gameover'; if(score>highScore){highScore=score; localStorage.setItem('drone_hs',highScore);} updateHS(); document.getElementById('go-score').textContent=score; document.getElementById('go-level').textContent=difficulty+1; ui.show('gameover'); return; }

  towerTimer++;
  if(towerTimer > Math.max(70, 120 - difficulty*3)) { towerTimer=0; spawnTower(); }
  
  bgBuildings.forEach(b => { b.x -= towerSpeed*speedMult*0.3; if(b.x + b.w < 0) { b.x = W + 50; b.h = 60 + Math.random()*100; } });

  towers.forEach(t => {
    t.x -= towerSpeed*speedMult;
    t.shootTimer++;
    // 🎯 СКАЛИРОВАНИЕ СТРЕЛЬБЫ: легко в начале, сложно позже
    const shootCooldown = Math.max(180, 400 - difficulty * 25);
    const shootChance = Math.min(0.85, 0.05 + difficulty * 0.12);
    if(t.shootTimer > shootCooldown && t.x > -30 && t.x < W*0.5 && Math.random() < shootChance) { 
      t.shootTimer = 0; spawnBullet(t); 
    }
    if(!t.passed && t.x+t.w < drone.x-10) { 
      t.passed=true; score++; ui.updateScore();
      if(score%10===0) spawnTarget();
      else if(score%5===0 && score>0) spawnMedkit();
      else if(score%15===0 && score>5) spawnShield();
    }
  });
  towers = towers.filter(t => t.x > -100);

  bullets.forEach(b => { b.x += b.vx*speedMult; b.y += b.vy*speedMult; b.life--; });
  bullets = bullets.filter(b => b.life > 0 && b.x > -20 && b.x < W+20 && b.y > -20 && b.y < H+20);

  if(target && targetActive) { target.x -= 1.5*speedMult; if(target.x < -50) { target=null; targetActive=false; } }
  if(medkit && !medkit.collected) { medkit.x -= 1.5*speedMult; medkit.pulse += 0.1; if(medkit.x < -30) medkit = null; }
  if(shieldMedkit && !shieldMedkit.collected) { shieldMedkit.x -= 1.5*speedMult; shieldMedkit.pulse += 0.1; if(shieldMedkit.x < -30) shieldMedkit = null; }

  const hit = checkCollisions();
  if(hit) {
    // Подбор предметов работает всегда
    if(hit==='target') {
      addExplosion(target.x, target.y, 50, 'target'); screenFlash = 1;
      sfx.target(); vibrate([30]); score+=5; difficulty++; ui.updateScore();
      droneHP = Math.min(maxHP, droneHP+1); ui.updateHP();
      slowMo=50; speedMult=0.2;
      towerSpeed = Math.min(3.2, 2.0+difficulty*0.2); bulletSpeed = Math.min(4.5, 3.0+difficulty*0.25);
      winMsgTimer=100; target=null; targetActive=false;
    } else if(hit==='medkit') {
      sfx.medkit(); vibrate([15]); droneHP = Math.min(maxHP, droneHP+1); ui.updateHP();
      medkit.collected = true; addExplosion(medkit.x, medkit.y, 10, 'medkit'); medkit = null;
    } else if(hit==='shield') {
      sfx.shield(); vibrate([15, 15, 15]); isInvincible = true; invincibleShieldTimer = 300; ui.updateShieldHUD();
      addExplosion(shieldMedkit.x, shieldMedkit.y, 15, 'shield'); shieldMedkit = null;
    } 
    // Урон только если нет щита и нет кд после удара
    else if (!isInvincible && invincible <= 0) {
      addExplosion(drone.x, drone.y, 15, 'hit'); screenFlash = 0.8;
      droneHP--; ui.updateHP(); invincible=60; drone.vy=4;
      sfx.hit(); vibrate([40]);
      if(hit==='bullet') bullets = bullets.filter(b => Math.hypot(drone.x-b.x, drone.y-b.y) > 5);
      if(droneHP<=0) { addExplosion(drone.x, drone.y, 40, 'drone'); sfx.over(); vibrate([50,100,50]); state='gameover'; if(score>highScore){highScore=score; localStorage.setItem('drone_hs',highScore);} updateHS(); document.getElementById('go-score').textContent=score; document.getElementById('go-level').textContent=difficulty+1; ui.show('gameover'); }
    }
  }

  particles.forEach(p => { p.x += p.vx*speedMult; p.y += p.vy*speedMult; p.vy += 0.05; p.life -= p.decay; p.size *= 0.95; });
  particles = particles.filter(p => p.life > 0);
}

function drawBuilding(t) {
  ctx.fillStyle = '#1e2530'; ctx.fillRect(t.x, 0, t.w, t.topH); ctx.fillRect(t.x, t.botY, t.w, H-groundH-t.botY);
  ctx.fillStyle = '#3a4a5a'; ctx.fillRect(t.x-3, t.topH-8, t.w+6, 8); ctx.fillRect(t.x-3, t.botY, t.w+6, 8);
  t.windows.forEach(win => {
    if(win.lit) { ctx.fillStyle = win.warm ? '#ffcc66' : '#aaddff'; ctx.globalAlpha = 0.8; ctx.fillRect(t.x + win.x, win.y, 8, 12); ctx.globalAlpha = 1; }
  });
  const sx = t.x + t.w/2;
  [t.topH-20, t.botY+15].forEach(sy => {
    const isAiming = t.shootTimer > Math.max(180, 400 - difficulty*25) - 40 && t.x < W*0.5;
    if(isAiming && Math.random() > 0.6) { ctx.fillStyle = 'rgba(255,0,0,0.25)'; ctx.beginPath(); ctx.arc(sx, sy, 7, 0, Math.PI*2); ctx.fill(); }
    ctx.fillStyle = '#3d4a3a'; ctx.fillRect(sx-4, sy-8, 8, 14); ctx.fillStyle = '#c9a66b'; ctx.beginPath(); ctx.arc(sx, sy-14, 5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#2a3528'; ctx.beginPath(); ctx.arc(sx, sy-16, 6, Math.PI, 0); ctx.fill(); ctx.fillStyle = '#3d4a3a'; ctx.fillRect(sx-4, sy+6, 3, 8); ctx.fillRect(sx+1, sy+6, 3, 8);
    const ang = Math.atan2(drone.y-sy, drone.x-sx); ctx.strokeStyle = '#111'; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(sx, sy-4); ctx.lineTo(sx+Math.cos(ang)*14, sy-4+Math.sin(ang)*14); ctx.stroke();
    const cooldown = Math.max(180, 400 - difficulty*25); const chance = Math.min(0.85, 0.05 + difficulty*0.12);
    if(frames%cooldown < 10 && Math.random() < chance && Math.abs(t.x-drone.x)<250) { ctx.fillStyle='#ffaa00'; ctx.beginPath(); ctx.arc(sx+Math.cos(ang)*15, sy-4+Math.sin(ang)*15, 4, 0, Math.PI*2); ctx.fill(); }
  });
}

function drawPickupTruck(x, y) {
  ctx.save(); ctx.translate(x, y);
  ctx.fillStyle = '#222'; ctx.beginPath(); ctx.arc(-15, 8, 5, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(12, 8, 5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#555'; ctx.beginPath(); ctx.arc(-15, 8, 2, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(12, 8, 2, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#4a5a3a'; ctx.fillRect(-22, -6, 44, 12); ctx.fillStyle = '#3a4a2a'; ctx.beginPath(); ctx.moveTo(-20, -6); ctx.lineTo(-20, -16); ctx.lineTo(-8, -16); ctx.lineTo(-4, -6); ctx.fill();
  ctx.fillStyle = '#2a3a1a'; ctx.fillRect(2, -12, 18, 6); ctx.fillStyle = '#7799bb'; ctx.fillRect(-18, -14, 8, 6);
  ctx.fillStyle = '#888'; ctx.fillRect(10, -22, 2, 16);
  const wave = Math.sin(frames * 0.1) * 2;
  ctx.fillStyle = '#005BBB'; ctx.beginPath(); ctx.moveTo(12, -26); ctx.lineTo(26+wave, -24); ctx.lineTo(26+wave, -18); ctx.lineTo(12, -20); ctx.fill();
  ctx.fillStyle = '#FFD500'; ctx.beginPath(); ctx.moveTo(12, -20); ctx.lineTo(26+wave, -18); ctx.lineTo(26+wave, -14); ctx.lineTo(12, -16); ctx.fill();
  ctx.fillStyle = '#ffaa00'; ctx.beginPath(); ctx.arc(-21, 0, 2, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawExplosions() {
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    if(p.type === 'drone' || p.type === 'hit') ctx.fillStyle = p.life>0.5?'#ff4444':'#ff8800';
    else if(p.type === 'target') ctx.fillStyle = p.life>0.6?'#ffdd00':p.life>0.3?'#ff6600':'#555';
    else if(p.type === 'medkit' || p.type === 'shield') ctx.fillStyle = '#a855f7';
    else ctx.fillStyle = '#aaa';
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawDrone() {
  const t = currentDrone;
  ctx.save();
  ctx.translate(drone.x + drone.w/2, drone.y + drone.h/2);
  ctx.rotate(drone.rot);
  if(isInvincible) { ctx.shadowColor = '#a855f7'; ctx.shadowBlur = 20; }
  if(Math.abs(drone.vy) > 2) { ctx.fillStyle = 'rgba(200,200,200,0.4)'; ctx.beginPath(); ctx.arc(-drone.w/2 - 10, -5 + drone.vy*2, 5, 0, Math.PI*2); ctx.fill(); }
  const grd = ctx.createLinearGradient(-drone.w/2, -drone.h/2, drone.w/2, drone.h/2);
  grd.addColorStop(0, t.c1); grd.addColorStop(1, t.c2);
  ctx.fillStyle = grd; ctx.beginPath(); ctx.ellipse(0, 0, drone.w/2, drone.h/2, 0, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 1; ctx.stroke();
  ctx.strokeStyle = '#888'; ctx.lineWidth = 2;
  for(let i=0; i<4; i++) {
    const ang = (i*90 + drone.prop) * Math.PI/180;
    const ox = Math.cos(ang)*22, oy = Math.sin(ang)*10 - 8;
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(ox, oy); ctx.stroke();
    ctx.fillStyle = '#aaa'; ctx.beginPath(); ctx.ellipse(ox, oy, 10, 3, ang, 0, Math.PI*2); ctx.fill();
  }
  ctx.fillStyle = '#fff'; ctx.fillRect(-15, -12, 12, 4); ctx.fillStyle = '#0039A6'; ctx.fillRect(-15, -8, 12, 4); ctx.fillStyle = '#D52B1E'; ctx.fillRect(-15, -4, 12, 4);
  ctx.restore();
}

function drawBackground() {
  const sg = ctx.createLinearGradient(0,0,0,H); sg.addColorStop(0,'#0b1120'); sg.addColorStop(1,'#151e2d');
  ctx.fillStyle = sg; ctx.fillRect(0,0,W,H);
  for(let i=0; i<50; i++) { ctx.fillStyle=`rgba(255,255,255,${Math.random()*0.4+0.2})`; ctx.beginPath(); ctx.arc((i*97+frames*0.2)%W, (i*73)%(H-100), Math.random()*1.5+0.5, 0, Math.PI*2); ctx.fill(); }
  bgBuildings.forEach(b => { ctx.fillStyle = b.color; ctx.fillRect(b.x, H-groundH-b.h, b.w, b.h); ctx.fillStyle = 'rgba(255,200,100,0.1)'; for(let wy=H-groundH-b.h+10; wy<H-groundH-10; wy+=15) for(let wx=b.x+5; wx<b.x+b.w-5; wx+=10) ctx.fillRect(wx, wy, 4, 6); });
  ctx.fillStyle = '#1e293b'; ctx.fillRect(0, H-groundH, W, groundH);
  ctx.fillStyle = '#2d3a4a';
  for(let i=0; i<W; i+=30) ctx.fillRect((i+frames*2*speedMult)%W, H-groundH, 20, 4);
}

function drawUIOverlay() {
  if(screenFlash>0) { ctx.fillStyle = screenFlash>0.5?'rgba(255,255,255,0.15)':'rgba(255,0,0,0.15)'; ctx.fillRect(0,0,W,H); }
  if(isInvincible) { ctx.fillStyle = `rgba(168, 85, 247, ${Math.sin(frames*0.15)*0.05 + 0.05})`; ctx.fillRect(0,0,W,H); }
  if(winMsgTimer>0) { winMsgTimer--; const a=Math.min(1, winMsgTimer/25); ctx.fillStyle=`rgba(0,0,0,${0.6*a})`; ctx.fillRect(W/2-130, H/2-30, 260, 60); ctx.strokeStyle=`rgba(72,187,120,${a})`; ctx.lineWidth=2; ctx.strokeRect(W/2-130, H/2-30, 260, 60); ctx.fillStyle=`rgba(72,187,120,${a})`; ctx.font='bold 18px monospace'; ctx.textAlign='center'; ctx.fillText('✅ ЦЕЛЬ УНИЧТОЖЕНА! +5', W/2, H/2-5); }
}

function draw() {
  drawBackground();
  towers.forEach(drawBuilding);
  bullets.forEach(b => { ctx.strokeStyle = 'rgba(255,150,50,0.6)'; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(b.x, b.y); ctx.lineTo(b.x-b.vx*8, b.y-b.vy*8); ctx.stroke(); ctx.fillStyle = '#ff4444'; ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill(); });
  if(medkit && !medkit.collected) { const p = Math.sin(medkit.pulse)*3 + 12; ctx.fillStyle = '#48bb78'; ctx.fillRect(medkit.x-p/2, medkit.y-p/2, p, p); ctx.fillStyle = '#fff'; ctx.fillRect(medkit.x-1, medkit.y-p/2, 2, p); ctx.fillRect(medkit.x-p/2, medkit.y-1, p, 2); ctx.strokeStyle = '#2d8a50'; ctx.lineWidth = 2; ctx.strokeRect(medkit.x-p/2-2, medkit.y-p/2-2, p+4, p+4); }
  if(shieldMedkit && !shieldMedkit.collected) { const p = Math.sin(shieldMedkit.pulse)*4 + 14; ctx.strokeStyle = '#a855f7'; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(shieldMedkit.x, shieldMedkit.y, p, 0, Math.PI*2); ctx.stroke(); ctx.fillStyle = '#a855f7'; ctx.globalAlpha = 0.15; ctx.fill(); ctx.globalAlpha = 1; ctx.fillStyle = '#fff'; ctx.font = 'bold 14px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('S', shieldMedkit.x, shieldMedkit.y); }
  if(target && targetActive) drawPickupTruck(target.x, target.y);
  if(invincible<=0 || frames%6<3) drawDrone();
  drawExplosions(); drawUIOverlay();
}

function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
gameLoop();
</script>
</body>
</html>
