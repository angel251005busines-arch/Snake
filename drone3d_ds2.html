<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Flappy Drone - Simple</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

body {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  overflow: hidden;
  font-family: -apple-system, 'Segoe UI', Arial, sans-serif;
  touch-action: manipulation;
  height: 100dvh;
  display: flex;
  justify-content: center;
  align-items: center;
}

#gameCanvas {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: block;
  background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
}

#ui {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 10;
  pointer-events: none;
}

#ui > * {
  pointer-events: auto;
}

.screen {
  display: none;
  flex-direction: column;
  align-items: center;
  text-align: center;
  color: white;
  width: 85%;
  max-width: 320px;
  background: rgba(0, 0, 0, 0.85);
  border-radius: 30px;
  padding: 30px 20px;
  backdrop-filter: blur(15px);
  border: 1px solid rgba(255,255,255,0.2);
  box-shadow: 0 20px 40px rgba(0,0,0,0.3);
}

.screen.active {
  display: flex;
}

h1 {
  font-size: 2.2rem;
  margin-bottom: 10px;
  background: linear-gradient(135deg, #ff6b35, #feca57);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

h2 {
  font-size: 1.3rem;
  margin: 10px 0;
  color: #ff6b35;
}

.btn {
  background: linear-gradient(135deg, #ff6b35, #feca57);
  border: none;
  color: white;
  padding: 14px 28px;
  margin: 8px;
  font-size: 1.1rem;
  font-weight: bold;
  cursor: pointer;
  border-radius: 50px;
  transition: transform 0.1s;
  width: 80%;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

.btn:active {
  transform: scale(0.95);
}

#hud {
  position: absolute;
  top: 20px;
  left: 20px;
  right: 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: white;
  font-size: 1.3rem;
  font-weight: bold;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
  background: rgba(0,0,0,0.5);
  padding: 10px 20px;
  border-radius: 50px;
  backdrop-filter: blur(5px);
  z-index: 20;
}

.hp-bar {
  width: 100px;
  height: 12px;
  background: rgba(0,0,0,0.6);
  border-radius: 6px;
  overflow: hidden;
  margin-left: 10px;
}

.hp-fill {
  height: 100%;
  background: #4CAF50;
  transition: width 0.2s;
  width: 100%;
}

.drone-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin: 20px 0;
  width: 100%;
}

.drone-card {
  background: rgba(255,255,255,0.1);
  border: 2px solid rgba(255,255,255,0.2);
  border-radius: 15px;
  padding: 15px;
  cursor: pointer;
  transition: all 0.2s;
}

.drone-card.selected {
  border-color: #4CAF50;
  background: rgba(76,175,80,0.2);
  transform: scale(1.02);
}

.drone-card:active {
  transform: scale(0.97);
}

.hint {
  font-size: 0.8rem;
  opacity: 0.7;
  margin-top: 15px;
}

#score-display {
  font-size: 1.5rem;
  font-weight: bold;
  background: rgba(0,0,0,0.5);
  padding: 5px 15px;
  border-radius: 25px;
}
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="ui">
  <div id="hud" style="display: none;">
    <div style="display: flex; align-items: center; gap: 8px;">
      <span>❤️</span>
      <div class="hp-bar"><div class="hp-fill" id="hpFill"></div></div>
    </div>
    <span id="scoreDisplay">0</span>
  </div>

  <div id="menuScreen" class="screen active">
    <h1>FLAPPY DRONE</h1>
    <h2>3D EDITION</h2>
    <button class="btn" id="playBtn">▶ ИГРАТЬ</button>
    <div class="hint">👇 Нажми на экран чтобы лететь</div>
  </div>

  <div id="selectScreen" class="screen">
    <h2>ВЫБЕРИ ДРОНА</h2>
    <div class="drone-grid" id="droneGrid"></div>
    <button class="btn" id="backBtn" style="background: #666;">← НАЗАД</button>
  </div>

  <div id="gameoverScreen" class="screen">
    <h2 style="color: #ff4444;">GAME OVER</h2>
    <div style="font-size: 1.3rem; margin: 15px 0;">
      Счёт: <span id="finalScore">0</span><br>
      Уровень: <span id="finalLevel">1</span>
    </div>
    <button class="btn" id="restartBtn">🔄 ИГРАТЬ СНОВА</button>
    <button class="btn" id="menuBackBtn" style="background: #666;">🏠 МЕНЮ</button>
  </div>
</div>

<script>
// ================= ИГРОВЫЕ ПАРАМЕТРЫ =================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// Размеры
let canvasWidth, canvasHeight;

// Игрок
let player = {
  x: 100,
  y: 0,
  vy: 0,
  width: 30,
  height: 30,
  hp: 5,
  maxHp: 5,
  invincible: 0,
  style: 'tactical'
};

// Препятствия
let obstacles = [];
let bullets = [];
let targets = [];

// Игровое состояние
let gameState = 'menu'; // menu, select, playing, gameover
let score = 0;
let level = 0;
let frame = 0;
let gravity = 0.6;
let flapPower = -8;
let obstacleSpeed = 3;
let spawnDelay = 0;
let soundEnabled = true;

// Дроны
const drones = [
  { id: 1, name: 'ТАКТИЧЕСКИЙ', style: 'tactical', color: '#3a7eb5', hp: 5 },
  { id: 2, name: 'СТЕЛС', style: 'stealth', color: '#1e2a4a', hp: 5 },
  { id: 3, name: 'FPV', style: 'racing', color: '#cc3333', hp: 5 },
  { id: 4, name: 'ТЯЖЁЛЫЙ', style: 'heavy', color: '#4a6a2a', hp: 7 }
];

let selectedDrone = 0;

// ================= ФУНКЦИИ =================
function resizeCanvas() {
  canvasWidth = window.innerWidth;
  canvasHeight = window.innerHeight;
  canvas.width = canvasWidth;
  canvas.height = canvasHeight;
  
  player.y = canvasHeight / 2;
}

function drawDrone(x, y, color, isInvincible) {
  ctx.save();
  
  // Эффект неуязвимости
  if (isInvincible && Math.floor(Date.now() / 100) % 2 === 0) {
    ctx.globalAlpha = 0.5;
  }
  
  // Тело дрона
  ctx.fillStyle = color;
  ctx.shadowBlur = 10;
  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  
  // Основной корпус
  ctx.fillRect(x - 15, y - 12, 30, 24);
  
  // Кабина
  ctx.fillStyle = '#88aaff';
  ctx.fillRect(x - 8, y - 8, 16, 16);
  
  // Пропеллеры
  ctx.fillStyle = '#cccccc';
  ctx.fillRect(x - 22, y - 16, 12, 4);
  ctx.fillRect(x + 10, y - 16, 12, 4);
  ctx.fillRect(x - 22, y + 12, 12, 4);
  ctx.fillRect(x + 10, y + 12, 12, 4);
  
  // Вращающиеся лопасти
  const angle = Date.now() / 50;
  ctx.fillStyle = '#aaaaaa';
  for (let i = -2; i <= 2; i+=4) {
    ctx.save();
    ctx.translate(x + i * 8, y - 14);
    ctx.rotate(angle);
    ctx.fillRect(-8, -2, 16, 4);
    ctx.restore();
    
    ctx.save();
    ctx.translate(x + i * 8, y + 14);
    ctx.rotate(angle);
    ctx.fillRect(-8, -2, 16, 4);
    ctx.restore();
  }
  
  // Огонь из двигателя (для эффекта)
  if (player.vy < -2) {
    ctx.fillStyle = '#ff6600';
    ctx.beginPath();
    ctx.moveTo(x - 18, y);
    ctx.lineTo(x - 28, y - 5);
    ctx.lineTo(x - 28, y + 5);
    ctx.fill();
  }
  
  ctx.restore();
}

function drawObstacle(x, y, width, height) {
  ctx.fillStyle = '#6b4c3b';
  ctx.shadowBlur = 5;
  ctx.fillRect(x, y, width, height);
  ctx.fillStyle = '#8b6c5b';
  ctx.fillRect(x + 5, y, width - 10, height);
}

function drawBullet(x, y) {
  ctx.fillStyle = '#ff4444';
  ctx.shadowBlur = 8;
  ctx.shadowColor = '#ff0000';
  ctx.beginPath();
  ctx.arc(x, y, 5, 0, Math.PI * 2);
  ctx.fill();
}

function drawTarget(x, y) {
  ctx.fillStyle = '#dd8844';
  ctx.shadowBlur = 5;
  ctx.fillRect(x - 15, y - 10, 30, 20);
  ctx.fillStyle = '#ffaa66';
  ctx.fillRect(x - 8, y - 18, 16, 12);
}

function spawnObstacle() {
  const gap = 180;
  const minGapY = 100;
  const maxGapY = canvasHeight - gap - 100;
  const gapY = Math.random() * (maxGapY - minGapY) + minGapY;
  
  obstacles.push({
    x: canvasWidth,
    topHeight: gapY,
    bottomY: gapY + gap,
    width: 50,
    passed: false
  });
}

function spawnBullet() {
  if (obstacles.length > 0 && Math.random() < 0.02) {
    const obs = obstacles[0];
    bullets.push({
      x: obs.x + 25,
      y: Math.random() * (obs.topHeight) + (Math.random() > 0.5 ? obs.bottomY : 0),
      vx: -5
    });
  }
}

function spawnTarget() {
  targets.push({
    x: canvasWidth,
    y: Math.random() * (canvasHeight - 100) + 50,
    width: 40,
    height: 30,
    vx: -3
  });
}

function resetGame() {
  const drone = drones[selectedDrone];
  player = {
    x: 100,
    y: canvasHeight / 2,
    vy: 0,
    width: 30,
    height: 30,
    hp: drone.hp,
    maxHp: drone.hp,
    invincible: 0,
    style: drone.style,
    color: drone.color
  };
  
  obstacles = [];
  bullets = [];
  targets = [];
  score = 0;
  level = 0;
  obstacleSpeed = 3;
  spawnDelay = 0;
  frame = 0;
  
  updateUI();
}

function updateUI() {
  document.getElementById('scoreDisplay').textContent = score;
  const hpPercent = (player.hp / player.maxHp) * 100;
  document.getElementById('hpFill').style.width = hpPercent + '%';
  document.getElementById('hpFill').style.backgroundColor = 
    player.hp > 2 ? '#4CAF50' : (player.hp > 1 ? '#FF9800' : '#f44336');
}

function gameLoop() {
  if (canvasWidth !== window.innerWidth || canvasHeight !== window.innerHeight) {
    resizeCanvas();
  }
  
  ctx.clearRect(0, 0, canvasWidth, canvasHeight);
  
  // Фон с градиентом
  const gradient = ctx.createLinearGradient(0, 0, 0, canvasHeight);
  gradient.addColorStop(0, '#1a1a2e');
  gradient.addColorStop(1, '#16213e');
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, canvasWidth, canvasHeight);
  
  // Облака для эффекта движения
  ctx.fillStyle = 'rgba(255,255,255,0.1)';
  for (let i = 0; i < 5; i++) {
    ctx.beginPath();
    ctx.ellipse((frame * 0.5 + i * 200) % (canvasWidth + 400) - 200, 100 + i * 150, 60, 40, 0, 0, Math.PI * 2);
    ctx.fill();
  }
  
  if (gameState === 'playing') {
    // Физика игрока
    player.vy += gravity;
    player.y += player.vy;
    
    // Границы
    if (player.y < 30) {
      player.y = 30;
      player.vy = 0;
    }
    if (player.y > canvasHeight - 30) {
      gameOver();
    }
    
    // Спавн препятствий
    spawnDelay++;
    if (spawnDelay > 90 - Math.min(40, level * 2)) {
      spawnDelay = 0;
      spawnObstacle();
    }
    
    // Спавн пуль
    if (Math.random() < 0.01) spawnBullet();
    
    // Спавн целей
    if (score > 0 && score % 10 === 0 && targets.length === 0 && frame > 60) {
      spawnTarget();
    }
    
    // Обновление препятствий
    for (let i = 0; i < obstacles.length; i++) {
      const obs = obstacles[i];
      obs.x -= obstacleSpeed;
      
      // Проверка прохождения
      if (!obs.passed && obs.x + obs.width < player.x) {
        obs.passed = true;
        score++;
        updateUI();
        
        // Увеличение сложности
        if (score % 5 === 0) {
          level++;
          obstacleSpeed = Math.min(7, 3 + level * 0.3);
        }
      }
      
      // Проверка столкновения
      if (player.invincible === 0 && 
          player.x + 15 > obs.x && 
          player.x - 15 < obs.x + obs.width) {
        if (player.y - 15 < obs.topHeight || player.y + 15 > obs.bottomY) {
          hit();
        }
      }
      
      // Отрисовка
      drawObstacle(obs.x, 0, obs.width, obs.topHeight);
      drawObstacle(obs.x, obs.bottomY, obs.width, canvasHeight - obs.bottomY);
    }
    
    // Удаление препятствий
    obstacles = obstacles.filter(obs => obs.x + obs.width > 0);
    
    // Обновление пуль
    for (let i = 0; i < bullets.length; i++) {
      bullets[i].x += bullets[i].vx;
      
      if (player.invincible === 0 && 
          Math.abs(bullets[i].x - player.x) < 20 && 
          Math.abs(bullets[i].y - player.y) < 20) {
        hit();
        bullets.splice(i, 1);
        i--;
      }
      
      drawBullet(bullets[i].x, bullets[i].y);
    }
    bullets = bullets.filter(b => b.x > 0);
    
    // Обновление целей
    for (let i = 0; i < targets.length; i++) {
      targets[i].x += targets[i].vx;
      
      if (Math.abs(targets[i].x - player.x) < 30 && Math.abs(targets[i].y - player.y) < 25) {
        score += 5;
        player.hp = Math.min(player.maxHp, player.hp + 1);
        updateUI();
        targets.splice(i, 1);
        i--;
        // Визуальный эффект
        player.invincible = 15;
        continue;
      }
      
      drawTarget(targets[i].x, targets[i].y);
    }
    targets = targets.filter(t => t.x + 30 > 0);
    
    // Обновление неуязвимости
    if (player.invincible > 0) player.invincible--;
    
    // Отрисовка игрока
    drawDrone(player.x, player.y, player.color || '#3a7eb5', player.invincible > 0);
    
    // Счет
    ctx.fillStyle = 'white';
    ctx.font = 'bold 24px Arial';
    ctx.shadowBlur = 0;
    ctx.fillText(`Счёт: ${score}`, canvasWidth - 120, 50);
    ctx.fillText(`Ур: ${level + 1}`, canvasWidth - 120, 90);
  }
  
  frame++;
  requestAnimationFrame(gameLoop);
}

function hit() {
  player.hp--;
  player.invincible = 40;
  player.vy = 5;
  updateUI();
  
  // Визуальный эффект
  canvas.style.filter = 'brightness(0.5)';
  setTimeout(() => { canvas.style.filter = 'brightness(1)'; }, 100);
  
  if (player.hp <= 0) {
    gameOver();
  }
}

function gameOver() {
  gameState = 'gameover';
  document.getElementById('finalScore').textContent = score;
  document.getElementById('finalLevel').textContent = level + 1;
  document.getElementById('gameoverScreen').classList.add('active');
  document.getElementById('hud').style.display = 'none';
}

function flap() {
  if (gameState === 'playing') {
    player.vy = flapPower;
    // Визуальный эффект
    canvas.style.transform = 'scale(0.99)';
    setTimeout(() => { canvas.style.transform = 'scale(1)'; }, 100);
  }
}

function buildDroneGrid() {
  const grid = document.getElementById('droneGrid');
  grid.innerHTML = '';
  drones.forEach((drone, index) => {
    const card = document.createElement('div');
    card.className = `drone-card ${selectedDrone === index ? 'selected' : ''}`;
    card.innerHTML = `
      <div style="font-weight:bold;margin-bottom:5px;">${drone.name}</div>
      <div style="font-size:0.75rem;">❤️ ${drone.hp} HP</div>
    `;
    card.onclick = () => {
      selectedDrone = index;
      buildDroneGrid();
      startGame();
    };
    grid.appendChild(card);
  });
}

function startGame() {
  gameState = 'playing';
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('hud').style.display = 'flex';
  resetGame();
}

// ================= ОБРАБОТЧИКИ СОБЫТИЙ =================
function handleTap(e) {
  e.preventDefault();
  flap();
}

canvas.addEventListener('touchstart', handleTap, { passive: false });
canvas.addEventListener('mousedown', handleTap);
window.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    flap();
  }
});

document.getElementById('playBtn').onclick = () => {
  document.getElementById('menuScreen').classList.remove('active');
  document.getElementById('selectScreen').classList.add('active');
  buildDroneGrid();
};

document.getElementById('backBtn').onclick = () => {
  document.getElementById('selectScreen').classList.remove('active');
  document.getElementById('menuScreen').classList.add('active');
};

document.getElementById('restartBtn').onclick = () => {
  startGame();
};

document.getElementById('menuBackBtn').onclick = () => {
  document.getElementById('gameoverScreen').classList.remove('active');
  document.getElementById('menuScreen').classList.add('active');
};

// Инициализация
resizeCanvas();
window.addEventListener('resize', resizeCanvas);
gameLoop();
</script>
</body>
</html>
