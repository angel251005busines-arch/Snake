<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Flappy Drone</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
body {
  background: #0a0a0a;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100dvh;
  overflow: hidden;
  font-family: 'Segoe UI', Arial, sans-serif;
  touch-action: none;
}
canvas {
  display: block;
  width: 100%;
  height: 100%;
  max-width: 420px;
  max-height: 720px;
  object-fit: contain;
  touch-action: none;
  background: #000;
}
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const LOG_W = 420, LOG_H = 720;
canvas.width = LOG_W; canvas.height = LOG_H;

// 🎮 Game State
let state = 'menu'; // menu, select, playing, gameover
let selectedDrone = 2; // 1=Тактический, 2=Стелс, 3=FPV, 4=Тяжёлый
let soundEnabled = true;

let score = 0, frames = 0, shakeTimer = 0;
let particles = [], explosions = [], winMsgTimer = 0;
let difficultyLevel = 0, speedMultiplier = 1.0, slowMoTimer = 0;
let baseTowerSpeed = 2.5, baseBulletSpeed = 4.5, currentTowerGap = 190, currentTowerInterval = 110;
let towerTimer = 0;
const towerWidth = 65;

const drone = { x: 80, y: LOG_H/2, w: 44, h: 30, vy: 0, gravity: 0.45, flapPower: -7.5, rotation: 0, propAngle: 0 };
let maxHP = 5; // 🔧 Поставь любое число: 5, 10, 20...
let droneHP = maxHP, invincibleTimer = 0, hitFlashTimer = 0;

let towers = [], bullets = [], target = null, targetActive = false;
const groundH = 60;

let stars = []; for(let i=0;i<60;i++) stars.push({x:Math.random()*LOG_W,y:Math.random()*LOG_H,s:Math.random()*2+0.5,b:Math.random()});
let clouds = []; for(let i=0;i<5;i++) clouds.push({x:Math.random()*LOG_W,y:Math.random()*LOG_H*0.5,w:Math.random()*80+40,speed:Math.random()*0.3+0.1});

// 🎯 Zones
const droneSelectZones = [
  { x: 30, y: 200, w: 160, h: 100, id: 1, name: 'ТАКТИЧЕСКИЙ' },
  { x: 230, y: 200, w: 160, h: 100, id: 2, name: 'СТЕЛС' },
  { x: 30, y: 340, w: 160, h: 100, id: 3, name: 'FPV ГОНЩИК' },
  { x: 230, y: 340, w: 160, h: 100, id: 4, name: 'ТЯЖЁЛЫЙ' }
];

// 🔊 Audio System (Web Audio API)
let audioCtx = null;
function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playTone(freq, type, duration, vol=0.1) {
  if (!soundEnabled || !audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(); osc.stop(audioCtx.currentTime + duration);
}

function playNoise(duration, vol=0.2) {
  if (!soundEnabled || !audioCtx) return;
  const bufferSize = audioCtx.sampleRate * duration;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
  const source = audioCtx.createBufferSource();
  source.buffer = buffer;
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
  source.connect(gain); gain.connect(audioCtx.destination);
  source.start();
}

function sfxFlap() { playNoise(0.05, 0.1); playTone(300, 'sine', 0.05, 0.05); }
function sfxHit() { playNoise(0.4, 0.4); playTone(80, 'sawtooth', 0.3, 0.2); }
function sfxTarget() { playTone(600, 'sine', 0.1, 0.15); setTimeout(()=>playTone(900, 'sine', 0.2, 0.15), 100); }
function sfxGameOver() { playTone(200, 'square', 0.3, 0.2); setTimeout(()=>playTone(100, 'sawtooth', 0.5, 0.3), 200); }
function sfxClick() { playTone(800, 'sine', 0.05, 0.1); }

function vibrate(pattern) { if (navigator.vibrate) navigator.vibrate(pattern); }

// 🎮 Core Functions
function resetGame() {
  drone.y = LOG_H/2; drone.vy = 0; drone.rotation = 0; drone.propAngle = 0;
  towers = []; bullets = []; particles = []; explosions = [];
  score = 0; frames = 0; towerTimer = 0;
  target = null; targetActive = false; winMsgTimer = 0;
  shakeTimer = 0; difficultyLevel = 0; speedMultiplier = 1.0; slowMoTimer = 0;
  baseTowerSpeed = 2.5; baseBulletSpeed = 4.5;
  currentTowerGap = 190; currentTowerInterval = 110;
  droneHP = maxHP; invincibleTimer = 0; hitFlashTimer = 0;
  state = 'playing';
}

function spawnTower() {
  const minY = 100, maxY = LOG_H - groundH - currentTowerGap - 100;
  const topH = Math.random() * (maxY - minY) + minY;
  towers.push({ x: LOG_W + 20, topH, botY: topH + currentTowerGap, shootTimer: 0, passed: false });
}

function spawnBullet(tower) {
  const sx = tower.x + towerWidth / 2;
  const sy = Math.random() > 0.5 ? tower.topH - 20 : tower.botY + 20;
  const dx = drone.x - sx, dy = drone.y - sy;
  const dist = Math.hypot(dx, dy) || 1;
  const speed = baseBulletSpeed * 0.85;
  bullets.push({ x: sx, y: sy, vx: (dx/dist)*speed, vy: (dy/dist)*speed, r: 4 });
}

function spawnTarget() {
  const types = ['tank', 'car', 'building'];
  const type = types[Math.floor(Math.random() * types.length)];
  target = { x: LOG_W + 60, y: LOG_H/2 + (Math.random()-0.5)*200, w: type==='building'?60:70, h: type==='building'?80:40, type, flagWave: 0 };
  targetActive = true;
}

function addExplosion(x, y, count, color) {
  for (let i = 0; i < count; i++) {
    const a = Math.random()*Math.PI*2, sp = Math.random()*5+1;
    explosions.push({ x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp, life: 1, decay: Math.random()*0.03+0.015, r: Math.random()*5+2, color: color||`hsl(${Math.random()*40+10},100%,${Math.random()*30+50}%)` });
  }
}
function addParticles(x, y, count, color) {
  for (let i = 0; i < count; i++) {
    particles.push({ x, y, vx:(Math.random()-0.5)*3, vy:(Math.random()-0.5)*3, life: 1, decay: Math.random()*0.02+0.01, r: Math.random()*3+1, color: color||'#fff' });
  }
}

// 🎯 Input Handling
function handleInput(e) {
  e.preventDefault();
  initAudio(); // 🔊 Важно для автоплея в мини-приложениях
  
  const rect = canvas.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  const x = (clientX - rect.left) * (LOG_W / rect.width);
  const y = (clientY - rect.top) * (LOG_H / rect.height);

  // 🔊 Toggle Sound
  if (state === 'menu' && x >= LOG_W - 60 && x <= LOG_W - 10 && y >= 10 && y <= 50) {
    soundEnabled = !soundEnabled;
    sfxClick();
    return;
  }

  if (state === 'menu') { state = 'select'; sfxClick(); return; }
  if (state === 'select') { 
    for (let z of droneSelectZones) {
      if (x >= z.x && x <= z.x+z.w && y >= z.y && y <= z.y+z.h) {
        selectedDrone = z.id; sfxClick(); resetGame(); return;
      }
    }
    if (x >= LOG_W/2 - 60 && x <= LOG_W/2 + 60 && y >= LOG_H - 30 && y <= LOG_H - 5) { state = 'menu'; sfxClick(); }
    return; 
  }
  if (state === 'gameover') { 
    shakeTimer = 0; state = 'select'; sfxClick(); return; 
  }
  if (state === 'playing') {
    drone.vy = drone.flapPower;
    addParticles(drone.x, drone.y + drone.h, 3, '#aaa');
    sfxFlap();
  }
}

canvas.addEventListener('pointerdown', handleInput, { passive: false });
canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleInput(e); }, { passive: false });
document.addEventListener('keydown', (e) => { if (e.code === 'Space') handleInput(e); });

function checkCollision(ax,ay,aw,ah, bx,by,bw,bh) {
  return ax < bx+bw && ax+aw > bx && ay < by+bh && ay+ah > by;
}

// Drawing helpers
function drawFlagRU(x,y,w,h) {
  const s = h/3; ctx.fillStyle='#fff'; ctx.fillRect(x,y,w,s); ctx.fillStyle='#0039A6'; ctx.fillRect(x,y+s,w,s); ctx.fillStyle='#D52B1E'; ctx.fillRect(x,y+s*2,w,s);
}
function drawFlagUA(x,y,w,h,wave) {
  const s = h/2; ctx.fillStyle='#005BBB'; ctx.fillRect(x,y,w,s); ctx.fillStyle='#FFD500'; ctx.fillRect(x,y+s,w,s);
  ctx.fillStyle='#888'; ctx.fillRect(x-3,y-5,3,h+10);
  if(wave!==undefined){ ctx.fillStyle='rgba(255,255,255,0.3)'; ctx.fillRect(x+Math.sin(wave)*3,y,w*0.3,h); }
}

function drawDrone_Tactical(x, y, rot) {
  ctx.save(); ctx.translate(x + drone.w/2, y + drone.h/2); ctx.rotate(rot);
  ctx.strokeStyle = '#555'; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(-22, 2); ctx.lineTo(22, 2); ctx.stroke();
  ctx.strokeStyle = '#888'; ctx.lineWidth = 2;
  [-22, 22].forEach(px => {
    ctx.beginPath(); ctx.moveTo(px, 0); ctx.lineTo(px + Math.sin(drone.propAngle)*8, -6); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(px, 0); ctx.lineTo(px - Math.cos(drone.propAngle)*8, -6); ctx.stroke();
  });
  ctx.fillStyle = '#3a3a3a'; ctx.beginPath(); ctx.moveTo(-18, -5); ctx.lineTo(18, -5); ctx.lineTo(20, 2); ctx.lineTo(-20, 2); ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#222'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.fillStyle = '#4a4a3a'; ctx.fillRect(-10, -3, 8, 4); ctx.fillRect(5, -1, 6, 3);
  drawFlagRU(-6, -12, 12, 6);
  ctx.fillStyle = '#1a1a1a'; ctx.fillRect(-4, 4, 8, 6);
  ctx.fillStyle = '#00ffcc'; ctx.beginPath(); ctx.arc(0, 7, 2, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawDrone_Stealth(x, y, rot) {
  ctx.save(); ctx.translate(x + drone.w/2, y + drone.h/2); ctx.rotate(rot);
  ctx.shadowColor = '#00d4ff'; ctx.shadowBlur = 8;
  ctx.fillStyle = '#1e293b'; ctx.beginPath(); ctx.moveTo(-22, -4); ctx.lineTo(15, -8); ctx.lineTo(22, 0); ctx.lineTo(15, 8); ctx.lineTo(-22, 4); ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#334155'; ctx.lineWidth = 2; ctx.stroke(); ctx.shadowBlur = 0;
  ctx.strokeStyle = 'rgba(0, 212, 255, 0.7)'; ctx.lineWidth = 2;
  [-18, 18].forEach(px => {
    ctx.beginPath(); ctx.ellipse(px, -2, 10, 3, 0, 0, Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.ellipse(px, 2, 10, 3, 0, 0, Math.PI*2); ctx.stroke();
    ctx.strokeStyle = '#00d4ff'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(px - Math.sin(drone.propAngle)*6, 0); ctx.lineTo(px + Math.sin(drone.propAngle)*6, 0); ctx.stroke();
  });
  ctx.globalAlpha = 0.8; drawFlagRU(-4, -14, 14, 8); ctx.globalAlpha = 1;
  ctx.fillStyle = '#0f172a'; ctx.beginPath(); ctx.arc(0, 6, 3, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#00ff88'; ctx.beginPath(); ctx.arc(0, 6, 1.5, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawDrone_Racing(x, y, rot) {
  ctx.save(); ctx.translate(x + drone.w/2, y + drone.h/2); ctx.rotate(rot);
  ctx.fillStyle = '#2a2a2a'; ctx.beginPath(); ctx.ellipse(0, 0, 16, 10, 0, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#444'; ctx.lineWidth = 0.5;
  for(let i=-12; i<12; i+=4) { ctx.beginPath(); ctx.moveTo(i, -8); ctx.lineTo(i+8, 8); ctx.stroke(); ctx.beginPath(); ctx.moveTo(i, -8); ctx.lineTo(i-8, 8); ctx.stroke(); }
  ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 5; ctx.beginPath(); ctx.moveTo(-14, 0); ctx.lineTo(14, 0); ctx.stroke();
  [-14, 14].forEach(px => {
    ctx.strokeStyle = '#666'; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(px, -2, 12, 0, Math.PI*2); ctx.stroke();
    ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(px, -2, 12, drone.propAngle, drone.propAngle + Math.PI*0.8); ctx.stroke();
    ctx.beginPath(); ctx.arc(px, -2, 12, drone.propAngle + Math.PI, drone.propAngle + Math.PI*1.8); ctx.stroke();
  });
  ctx.fillStyle = '#ff3333'; ctx.fillRect(-8, -4, 16, 2); ctx.fillStyle = '#111'; ctx.fillRect(-6, -3, 4, 1);
  ctx.globalAlpha = 0.9; drawFlagRU(4, -8, 10, 5); ctx.globalAlpha = 1;
  ctx.fillStyle = '#000'; ctx.beginPath(); ctx.moveTo(10, -3); ctx.lineTo(18, 0); ctx.lineTo(10, 3); ctx.fill();
  ctx.restore();
}

function drawDrone_Heavy(x, y, rot) {
  ctx.save(); ctx.translate(x + drone.w/2, y + drone.h/2); ctx.rotate(rot);
  ctx.fillStyle = '#4b5320'; ctx.beginPath(); ctx.moveTo(-20, -6); ctx.quadraticCurveTo(10, -8, 22, 0); ctx.quadraticCurveTo(10, 8, -20, 6); ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#3a401a'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.fillStyle = '#5a632a'; ctx.fillRect(-15, -10, 24, 4); ctx.fillRect(-15, 6, 24, 4);
  ctx.strokeStyle = '#333'; ctx.lineWidth = 2;
  [-15].forEach(px => {
    ctx.beginPath(); ctx.moveTo(px, 2); ctx.lineTo(px - 10, 2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(px, -6); ctx.lineTo(px - 10, -6); ctx.stroke();
    ctx.strokeStyle = '#888'; ctx.lineWidth = 1.5;
    [2, -6].forEach(py => {
      ctx.beginPath(); ctx.moveTo(px - 10, py - 5 + Math.sin(drone.propAngle)*4); ctx.lineTo(px - 10, py + 5 - Math.cos(drone.propAngle)*4); ctx.stroke();
    });
  });
  ctx.fillStyle = '#222'; ctx.fillRect(-5, 9, 12, 3);
  ctx.fillStyle = '#ffaa00'; ctx.beginPath(); ctx.moveTo(7, 9); ctx.lineTo(12, 10.5); ctx.lineTo(7, 12); ctx.fill();
  drawFlagRU(-16, -10, 10, 6);
  ctx.fillStyle = '#111'; ctx.fillRect(10, -2, 6, 4);
  ctx.fillStyle = '#0055ff'; ctx.beginPath(); ctx.arc(13, 0, 1.5, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawDrone(x, y, rot) {
  if (selectedDrone === 1) drawDrone_Tactical(x, y, rot);
  else if (selectedDrone === 2) drawDrone_Stealth(x, y, rot);
  else if (selectedDrone === 3) drawDrone_Racing(x, y, rot);
  else drawDrone_Heavy(x, y, rot);
}

function drawDronePreview(x, y, styleId) {
  const old = selectedDrone; selectedDrone = styleId; drawDrone(x, y, 0); selectedDrone = old;
}

function drawTower(t) {
  const x=t.x, w=towerWidth;
  const g=ctx.createLinearGradient(x,0,x+w,0); g.addColorStop(0,'#4a4a4a'); g.addColorStop(0.5,'#6a6a6a'); g.addColorStop(1,'#4a4a4a');
  ctx.fillStyle=g; ctx.fillRect(x,0,w,t.topH);
  ctx.fillStyle='#555'; ctx.fillRect(x-5,t.topH-15,w+10,15); ctx.fillStyle='#666'; ctx.fillRect(x-3,t.topH-12,w+6,9);
  ctx.fillStyle=g; ctx.fillRect(x,t.botY,w,LOG_H-t.botY-groundH);
  ctx.fillStyle='#555'; ctx.fillRect(x-5,t.botY,w+10,15); ctx.fillStyle='#666'; ctx.fillRect(x-3,t.botY+3,w+6,9);
  ctx.fillStyle='#8B7355'; for(let i=0;i<3;i++) ctx.fillRect(x+5,t.topH-30-i*8,w-10,6);
  
  const sx = t.x + w/2;
  [t.topH-20, t.botY+20].forEach(sy => {
    ctx.fillStyle='#3d5a3d'; ctx.fillRect(sx-5,sy-8,10,16);
    ctx.fillStyle='#d4a574'; ctx.beginPath(); ctx.arc(sx,sy-12,5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#3d5a3d'; ctx.beginPath(); ctx.arc(sx,sy-14,6,Math.PI,0); ctx.fill();
    ctx.strokeStyle='#222'; ctx.lineWidth=2;
    const ga=Math.atan2(drone.y-sy, drone.x-sx);
    ctx.beginPath(); ctx.moveTo(sx,sy-4); ctx.lineTo(sx+Math.cos(ga)*15, sy-4+Math.sin(ga)*15); ctx.stroke();
    if(frames%60<5 && Math.abs(t.x-drone.x)<300){ ctx.fillStyle='#ff0'; ctx.beginPath(); ctx.arc(sx+Math.cos(ga)*16, sy-4+Math.sin(ga)*16, 4, 0, Math.PI*2); ctx.fill(); }
  });
  ctx.fillStyle='#ff6b35'; ctx.fillRect(x,t.topH-20,4,20); ctx.fillRect(x+w-4,t.topH-20,4,20); ctx.fillRect(x,t.botY,4,20); ctx.fillRect(x+w-4,t.botY,4,20);
}

function drawBullet(b) {
  ctx.fillStyle='#ff4444'; ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#ffaa00'; ctx.beginPath(); ctx.arc(b.x,b.y,b.r*0.5,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='rgba(255,100,0,0.4)'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(b.x,b.y); ctx.lineTo(b.x-b.vx*5, b.y-b.vy*5); ctx.stroke();
}

function drawTarget(t) {
  if(!t) return; t.flagWave+=0.05; const x=t.x, y=t.y;
  if(t.type==='tank'){
    ctx.fillStyle='#4a5a2a'; ctx.fillRect(x-30,y-10,60,20); ctx.fillStyle='#5a6a3a'; ctx.fillRect(x-20,y-20,40,12);
    ctx.fillStyle='#3a4a2a'; ctx.fillRect(x+20,y-16,30,5); ctx.fillStyle='#333'; ctx.fillRect(x-35,y+8,70,10);
    for(let i=0;i<5;i++){ ctx.fillStyle='#555'; ctx.beginPath(); ctx.arc(x-25+i*13,y+13,4,0,Math.PI*2); ctx.fill(); }
  } else if(t.type==='car'){
    ctx.fillStyle='#5a4a3a'; ctx.fillRect(x-25,y-5,50,18); ctx.fillStyle='#6a5a4a'; ctx.fillRect(x-15,y-15,30,12);
    ctx.fillStyle='#88bbdd'; ctx.fillRect(x-12,y-13,10,8); ctx.fillRect(x+2,y-13,10,8);
    ctx.fillStyle='#222'; ctx.beginPath(); ctx.arc(x-18,y+13,6,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(x+18,y+13,6,0,Math.PI*2); ctx.fill();
  } else {
    ctx.fillStyle='#777'; ctx.fillRect(x-25,y-40,50,80); ctx.fillStyle='#ff8';
    for(let r=0;r<4;r++) for(let c=0;c<3;c++) ctx.fillRect(x-18+c*15, y-30+r*16, 8, 10);
    ctx.fillStyle='#666'; ctx.fillRect(x-28,y-44,56,6);
  }
  drawFlagUA(x-5, y-40, 18, 12, t.flagWave);
  ctx.strokeStyle='rgba(255,0,0,0.6)'; ctx.lineWidth=2; ctx.setLineDash([4,4]); ctx.strokeRect(x-t.w/2-5,y-t.h/2-5,t.w+10,t.h+10); ctx.setLineDash([]);
  ctx.fillStyle='#ff4444'; ctx.font='bold 12px monospace'; ctx.textAlign='center'; ctx.fillText('▲ ЦЕЛЬ ▲', x, y-t.h/2-18);
}

function drawBackground() {
  const sg=ctx.createLinearGradient(0,0,0,LOG_H-groundH); sg.addColorStop(0,'#1a1a2e'); sg.addColorStop(0.5,'#16213e'); sg.addColorStop(1,'#0f3460');
  ctx.fillStyle=sg; ctx.fillRect(0,0,LOG_W,LOG_H-groundH);
  stars.forEach(s=>{ s.b+=0.02; const a=(Math.sin(s.b)+1)/2; ctx.fillStyle=`rgba(255,255,255,${a*0.8})`; ctx.beginPath(); ctx.arc(s.x,s.y,s.s,0,Math.PI*2); ctx.fill(); });
  clouds.forEach(c=>{ c.x-=c.speed; if(c.x+c.w<0){c.x=LOG_W+c.w; c.y=Math.random()*LOG_H*0.4;} ctx.fillStyle='rgba(255,255,255,0.05)'; ctx.beginPath(); ctx.ellipse(c.x,c.y,c.w/2,15,0,0,Math.PI*2); ctx.fill(); });
  const gg=ctx.createLinearGradient(0,LOG_H-groundH,0,LOG_H); gg.addColorStop(0,'#3a5a3a'); gg.addColorStop(0.3,'#2d4a2d'); gg.addColorStop(1,'#1a3a1a');
  ctx.fillStyle=gg; ctx.fillRect(0,LOG_H-groundH,LOG_W,groundH);
  ctx.strokeStyle='#4a7a4a'; ctx.lineWidth=3; ctx.beginPath(); ctx.moveTo(0,LOG_H-groundH); ctx.lineTo(LOG_W,LOG_H-groundH); ctx.stroke();
  ctx.fillStyle='#4a7a4a'; for(let i=0;i<LOG_W;i+=20) ctx.fillRect((i+frames*2)%LOG_W, LOG_H-groundH, 2, -8);
}

function drawUI() {
  ctx.fillStyle='#fff'; ctx.font='bold 36px monospace'; ctx.textAlign='center'; ctx.strokeStyle='#000'; ctx.lineWidth=4;
  ctx.strokeText(score, LOG_W/2, 50); ctx.fillText(score, LOG_W/2, 50);
  const next=10-(score%10); ctx.font='14px monospace'; ctx.fillStyle='rgba(255,255,255,0.5)';
  ctx.fillText(`До цели: ${next}`, LOG_W/2, 75);
  ctx.fillStyle='#ffaa00'; ctx.fillText(`⚡ Уровень: ${difficultyLevel+1}`, LOG_W/2, 95);
  if(slowMoTimer>0){ ctx.fillStyle='#48bb78'; ctx.fillText('⏳ BULLET TIME', LOG_W/2, 115); }
  const hpW = 50, hpH = 6, hpX = 15, hpY = 15;
  ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(hpX, hpY, hpW, hpH);
  ctx.fillStyle = droneHP > 1 ? '#48bb78' : '#ff4444';
  ctx.fillRect(hpX, hpY, hpW * (droneHP/maxHP), hpH);
  ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 1; ctx.strokeRect(hpX, hpY, hpW, hpH);
}

function drawWinMessage() {
  if(winMsgTimer<=0) return;
  const a=Math.min(1, winMsgTimer/30);
  ctx.save(); ctx.globalAlpha=a;
  ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(LOG_W/2-140, LOG_H/2-30, 280, 60);
  ctx.strokeStyle='#48bb78'; ctx.lineWidth=3; ctx.strokeRect(LOG_W/2-140, LOG_H/2-30, 280, 60);
  ctx.fillStyle='#48bb78'; ctx.font='bold 22px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('✅ ЦЕЛЬ УНИЧТОЖЕНА! +5', LOG_W/2, LOG_H/2-5);
  ctx.fillStyle='#fff'; ctx.font='14px monospace'; ctx.fillText('Продолжаем...', LOG_W/2, LOG_H/2+18);
  ctx.restore();
}

function drawSelectMenu() {
  drawBackground();
  ctx.fillStyle = '#fff'; ctx.font = 'bold 28px monospace'; ctx.textAlign = 'center'; ctx.strokeStyle = '#000'; ctx.lineWidth = 4;
  ctx.strokeText('ВЫБЕРИ ДРОНА', LOG_W/2, 60); ctx.fillText('ВЫБЕРИ ДРОНА', LOG_W/2, 60);
  ctx.font = '14px monospace'; ctx.fillStyle = 'rgba(255,255,255,0.7)'; ctx.fillText('Кликни на карточку', LOG_W/2, 90);

  droneSelectZones.forEach(z => {
    const isSelected = selectedDrone === z.id;
    ctx.fillStyle = isSelected ? 'rgba(72, 187, 120, 0.2)' : 'rgba(255,255,255,0.05)';
    ctx.fillRect(z.x, z.y, z.w, z.h);
    ctx.strokeStyle = isSelected ? '#48bb78' : 'rgba(255,255,255,0.3)';
    ctx.lineWidth = isSelected ? 3 : 1; ctx.strokeRect(z.x, z.y, z.w, z.h);
    ctx.fillStyle = isSelected ? '#48bb78' : '#fff'; ctx.font = 'bold 12px monospace'; ctx.fillText(z.name, z.x + z.w/2, z.y + 15);
    const previewY = z.y + 50 + Math.sin(frames * 0.05 + z.id) * 3;
    drawDronePreview(z.x + z.w/2, previewY, z.id);
    if (isSelected) { ctx.fillStyle = '#48bb78'; ctx.font = 'bold 16px monospace'; ctx.fillText('✓ ВЫБРАН', z.x + z.w/2, z.y + z.h - 10); }
  });

  ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.font = '12px monospace'; ctx.fillText('Тапай по карточке → Старт', LOG_W/2, LOG_H - 40);
  ctx.fillStyle = 'rgba(255,107,53,0.2)'; ctx.fillRect(LOG_W/2 - 60, LOG_H - 30, 120, 25);
  ctx.strokeStyle = '#ff6b35'; ctx.strokeRect(LOG_W/2 - 60, LOG_H - 30, 120, 25);
  ctx.fillStyle = '#ff6b35'; ctx.font = 'bold 12px monospace'; ctx.fillText('← МЕНЮ', LOG_W/2, LOG_H - 14);
}

function drawMenu() {
  drawBackground();
  ctx.fillStyle='#fff'; ctx.font='bold 42px monospace'; ctx.textAlign='center'; ctx.strokeStyle='#000'; ctx.lineWidth=5;
  ctx.strokeText('FLAPPY', LOG_W/2, LOG_H/3); ctx.fillText('FLAPPY', LOG_W/2, LOG_H/3);
  ctx.fillStyle='#ff6b35'; ctx.strokeText('DRONE', LOG_W/2, LOG_H/3+50); ctx.fillText('DRONE', LOG_W/2, LOG_H/3+50);
  drone.y=LOG_H/2-20+Math.sin(frames*0.05)*15; drawDrone(drone.x, drone.y, 0);
  ctx.fillStyle='#fff'; ctx.font='18px monospace'; ctx.fillText('Тапай / Клик / Пробел', LOG_W/2, LOG_H/2+80); ctx.fillText('чтобы лететь', LOG_W/2, LOG_H/2+105);
  ctx.font='14px monospace'; ctx.fillStyle='rgba(255,255,255,0.6)'; ctx.fillText('Уклоняйся от выстрелов', LOG_W/2, LOG_H/2+145); ctx.fillText('Уничтожай цели!', LOG_W/2, LOG_H/2+165);
  ctx.fillStyle='#ff6b35'; ctx.font='bold 20px monospace'; if(Math.sin(frames*0.08)>0) ctx.fillText('>>> НАЖМИ <<<', LOG_W/2, LOG_H/2+210);
  drawFlagRU(LOG_W/2-30, LOG_H/3-70, 60, 20);
  ctx.font = '12px monospace'; ctx.fillStyle = 'rgba(255,255,255,0.5)';
  const names = ['', 'ТАКТИЧЕСКИЙ', 'СТЕЛС', 'FPV', 'ТЯЖЁЛЫЙ'];
  ctx.fillText(`Текущий: ${names[selectedDrone]}`, LOG_W/2, LOG_H/2+245);
  
  // Sound Toggle Button
  ctx.fillStyle = soundEnabled ? '#48bb78' : '#ff4444';
  ctx.fillRect(LOG_W - 50, 15, 40, 30);
  ctx.fillStyle = '#fff'; ctx.font = '20px monospace';
  ctx.fillText(soundEnabled ? '🔊' : '🔇', LOG_W - 30, 38);
}

function drawGameOver() {
  ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(0,0,LOG_W,LOG_H);
  ctx.fillStyle='#ff4444'; ctx.font='bold 40px monospace'; ctx.textAlign='center'; ctx.fillText('GAME OVER', LOG_W/2, LOG_H/3);
  ctx.fillStyle='#fff'; ctx.font='24px monospace'; ctx.fillText(`Счёт: ${score} | Ур: ${difficultyLevel+1}`, LOG_W/2, LOG_H/3+50);
  ctx.fillStyle='rgba(255,255,255,0.6)'; ctx.font='16px monospace'; ctx.fillText('Нажми для выбора дрона', LOG_W/2, LOG_H/2+50);
}

function update() {
  frames++;
  if(state!=='playing') return;
  if(slowMoTimer>0) { slowMoTimer--; speedMultiplier=0.35; } else { speedMultiplier=Math.min(1.0, speedMultiplier+0.015); }
  if(invincibleTimer > 0) invincibleTimer--;
  if(hitFlashTimer > 0) hitFlashTimer--;
  if(winMsgTimer > 0) winMsgTimer--;

  drone.vy += drone.gravity * speedMultiplier;
  drone.y += drone.vy * speedMultiplier;
  drone.rotation = Math.max(-0.5, Math.min(drone.vy*0.08, 0.8));
  if(drone.y<0){ drone.y=0; drone.vy=0; }
  if(drone.y+drone.h > LOG_H-groundH){ addExplosion(drone.x+drone.w/2, drone.y+drone.h/2, 30); shakeTimer=15; state='gameover'; sfxGameOver(); vibrate([50,100,50]); return; }

  towerTimer++;
  if(towerTimer >= currentTowerInterval){ towerTimer=0; spawnTower(); }

  towers.forEach(t => {
    t.x -= baseTowerSpeed * speedMultiplier;
    t.shootTimer++;
    if(t.shootTimer >= 90 && t.x > drone.x - 200 && t.x < LOG_W + 50){ t.shootTimer = 0; spawnBullet(t); }
    if(!t.passed && t.x+towerWidth < drone.x){ t.passed=true; score++; if(score%10===0) spawnTarget(); }
  });
  towers = towers.filter(t => t.x+towerWidth > -50);

  bullets.forEach(b => { b.x += b.vx*speedMultiplier; b.y += b.vy*speedMultiplier; });
  bullets = bullets.filter(b => b.x>-20 && b.x<LOG_W+20 && b.y>-20 && b.y<LOG_H+20);

  bullets.forEach(b => {
    if(invincibleTimer > 0) return;
    if(Math.hypot(b.x-(drone.x+drone.w/2), b.y-(drone.y+drone.h/2)) < b.r+12){
      droneHP--; hitFlashTimer = 15; invincibleTimer = 90; shakeTimer = 8;
      addExplosion(drone.x+drone.w/2, drone.y+drone.h/2, 15, '#ff4444');
      sfxHit(); vibrate([40]); // 🔊📳
      drone.vy = 4; drone.x = Math.max(30, drone.x - 25);
      b.x = -999; b.y = -999;
      if(droneHP <= 0){ addExplosion(drone.x+drone.w/2, drone.y+drone.h/2, 40, '#ff8844'); shakeTimer=20; state='gameover'; sfxGameOver(); vibrate([50,100,50]); }
    }
  });

  towers.forEach(t => {
    if(checkCollision(drone.x,drone.y,drone.w,drone.h, t.x,0,towerWidth,t.topH) ||
       checkCollision(drone.x,drone.y,drone.w,drone.h, t.x,t.botY,towerWidth,LOG_H-t.botY)){
      addExplosion(drone.x+drone.w/2, drone.y+drone.h/2, 25, '#ff8844'); shakeTimer=10; state='gameover'; sfxHit(); vibrate([50,100,50]);
    }
  });

  if(target && targetActive){
    target.x -= 1.5 * speedMultiplier;
    if(checkCollision(drone.x,drone.y,drone.w,drone.h, target.x-target.w/2, target.y-target.h/2, target.w, target.h)){
      addExplosion(target.x, target.y, 50, '#ffaa00'); addExplosion(target.x, target.y, 30, '#ff4444');
      shakeTimer=20; score+=5; targetActive=false; target=null; winMsgTimer=120;
      sfxTarget(); vibrate([20]); // 🔊📳
      slowMoTimer=60; speedMultiplier=0.35; difficultyLevel++;
      baseTowerSpeed=Math.min(5.5, 2.5+difficultyLevel*0.4);
      baseBulletSpeed=Math.min(7.0, 4.5+difficultyLevel*0.5);
      currentTowerGap=Math.max(130, 190-difficultyLevel*10);
      currentTowerInterval=Math.max(75, 110-difficultyLevel*8);
    }
    if(target.x+target.w/2 < -50){ targetActive=false; target=null; }
  }

  particles.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.life-=p.decay; }); particles=particles.filter(p=>p.life>0);
  explosions.forEach(e=>{ e.x+=e.vx; e.y+=e.vy; e.vy+=0.1; e.life-=e.decay; }); explosions=explosions.filter(e=>e.life>0);
  if(shakeTimer>0) shakeTimer--;
}

function draw() {
  ctx.save();
  if(shakeTimer>0 && (state==='playing' || state==='gameover')) {
    ctx.translate((Math.random()-0.5)*shakeTimer, (Math.random()-0.5)*shakeTimer);
  }
  
  if(slowMoTimer>0){ ctx.fillStyle='rgba(0,100,255,0.08)'; ctx.fillRect(0,0,LOG_W,LOG_H); ctx.strokeStyle='rgba(0,200,255,0.4)'; ctx.lineWidth=4; ctx.strokeRect(10,10,LOG_W-20,LOG_H-20); }
  if(hitFlashTimer > 0){ ctx.fillStyle = 'rgba(255,0,0,0.15)'; ctx.fillRect(0,0,LOG_W,LOG_H); }

  if(state==='menu') drawMenu();
  else if(state==='select') drawSelectMenu();
  else {
    drawBackground();
    towers.forEach(t=>drawTower(t));
    if(target && targetActive) drawTarget(target);
    bullets.forEach(b=>drawBullet(b));
    if(state==='playing') { if(invincibleTimer <= 0 || frames % 6 < 3) drawDrone(drone.x, drone.y, drone.rotation); }
    particles.forEach(p=>{ ctx.globalAlpha=p.life; ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill(); }); ctx.globalAlpha=1;
    explosions.forEach(e=>{ ctx.globalAlpha=e.life; ctx.fillStyle=e.color; ctx.beginPath(); ctx.arc(e.x,e.y,e.r*e.life,0,Math.PI*2); ctx.fill(); }); ctx.globalAlpha=1;
    drawUI(); drawWinMessage();
    if(state==='gameover') drawGameOver();
  }
  ctx.restore();
}

function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
gameLoop();
</script>
