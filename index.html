<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎮 Игровой центр</title>
    <!-- Font Awesome 6 (бесплатные иконки) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: pan-x pan-y;
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 700px;
            width: 100%;
        }
        h1 {
            color: white;
            font-size: 42px;
            margin-bottom: 10px;
            text-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        h1 i {
            background: linear-gradient(135deg, #ffd89b, #c7e9fb);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .subtitle {
            color: #aaa;
            margin-bottom: 50px;
            font-size: 16px;
            letter-spacing: 1px;
        }
        .games {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 25px;
        }
        .game-card {
            background: rgba(30, 30, 46, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 28px;
            padding: 30px 20px;
            text-decoration: none;
            transition: all 0.3s ease;
            display: block;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }
        .game-card:active {
            transform: scale(0.96);
        }
        .game-card:hover {
            transform: translateY(-5px);
            border-color: rgba(76, 175, 80, 0.5);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }
        /* Разные цвета для карточек */
        .game-card:nth-child(1) .icon-wrapper {
            background: linear-gradient(135deg, #4CAF50, #2E7D32);
        }
        .game-card:nth-child(2) .icon-wrapper {
            background: linear-gradient(135deg, #2196F3, #1565C0);
        }
        .game-card:nth-child(3) .icon-wrapper {
            background: linear-gradient(135deg, #FF9800, #E65100);
        }
        .icon-wrapper {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 30px;
            transition: transform 0.2s;
        }
        .game-card:hover .icon-wrapper {
            transform: scale(1.05);
        }
        .icon-wrapper i {
            font-size: 48px;
            color: white;
            filter: drop-shadow(2px 4px 8px rgba(0,0,0,0.2));
        }
        .game-title {
            font-size: 22px;
            color: white;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .game-desc {
            font-size: 13px;
            color: #aaa;
            line-height: 1.4;
        }
        .coming-soon {
            opacity: 0.6;
            pointer-events: none;
        }
        .coming-soon .icon-wrapper {
            background: linear-gradient(135deg, #555, #333);
        }
        
        /* Адаптив */
        @media (max-width: 550px) {
            h1 { font-size: 32px; }
            .games { gap: 15px; }
            .game-card { padding: 20px 15px; }
            .icon-wrapper { width: 60px; height: 60px; }
            .icon-wrapper i { font-size: 32px; }
            .game-title { font-size: 18px; }
            .game-desc { font-size: 11px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            <i class="fas fa-gamepad"></i> Игровой центр
        </h1>
        <div class="subtitle">Выбери свою игру</div>
        <div class="games">
            <!-- Змейка -->
            <a href="snake.html" class="game-card">
                <div class="icon-wrapper">
                    <i class="fas fa-snake"></i>
                </div>
                <div class="game-title">Змейка</div>
                <div class="game-desc">Классическая игра на скорость</div>
            </a>

            <!-- Flappy Drone -->
            <a href="drone.html" class="game-card">
                <div class="icon-wrapper">
                    <i class="fas fa-helicopter"></i>
                </div>
                <div class="game-title">Flappy Drone</div>
                <div class="game-desc">Управляй дроном</div>
            </a>
            
            <!-- Скоро -->
            <div class="game-card coming-soon">
                <div class="icon-wrapper">
                    <i class="fas fa-hourglass-half"></i>
                </div>
                <div class="game-title">Скоро</div>
                <div class="game-desc">Новая игра в разработке</div>
            </div>
        </div>
    </div>
</body>
</html>
