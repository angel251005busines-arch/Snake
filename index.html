<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎮 Игровой центр</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #1e1e1e;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: pan-x pan-y;
        }
        .container {
            text-align: center;
            padding: 20px;
        }
        h1 {
            color: white;
            font-size: 32px;
            margin-bottom: 20px;
        }
        .subtitle {
            color: #aaa;
            margin-bottom: 40px;
            font-size: 16px;
        }
        .games {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            max-width: 600px;
            margin: 0 auto;
        }
        .game-card {
            background: linear-gradient(145deg, #2a2a2a, #1e1e1e);
            border: 2px solid #444;
            border-radius: 20px;
            padding: 30px 20px;
            text-decoration: none;
            transition: transform 0.2s, border-color 0.2s;
            display: block;
            cursor: pointer;
        }
        .game-card:active {
            transform: scale(0.97);
        }
        .game-card:hover {
            border-color: #4CAF50;
        }
        .game-icon {
            font-size: 64px;
            display: block;
            margin-bottom: 15px;
        }
        .game-title {
            font-size: 22px;
            color: white;
            font-weight: 600;
        }
        .game-desc {
            font-size: 14px;
            color: #aaa;
            margin-top: 8px;
        }
        .coming-soon {
            opacity: 0.5;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 Игровой центр</h1>
        <div class="subtitle">Выбери игру</div>
        <div class="games">
            <a href="snake.html" class="game-card">
                <span class="game-icon">🐍</span>
                <div class="game-title">Змейка</div>
                <div class="game-desc">Классическая игра на скорость</div>
            </a>

            <a href="drone.html" class="game-card">
              <span class="game-icon">🚁</span>
              <div class="game-title">Flappy Drone</div>
              <div class="game-desc">Управляй дроном</div>
             </a>
            
            <div class="game-card coming-soon">
                <span class="game-icon">🧩</span>
                <div class="game-title">Скоро</div>
                <div class="game-desc">Новая игра в разработке</div>
            </div>
        </div>
    </div>
</body>
</html>
